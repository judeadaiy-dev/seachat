name: Flutter Auto-Android Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0' 

      - name: Clean and Reconstruct
        run: |
          rm -rf android
          # إنشاء المجلد بالهوية الصحيحة لتوافق Supabase
          flutter create . --platforms android --org com.seachat.app
          flutter pub get

      # الخطوة الأولى: حقن إعدادات الـ SDK والمجلد المفقودة تلقائياً
      - name: Auto-Configure Android SDK
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties
          # ضبط الإصدار 35 المطلوب من المكتبات الحديثة
          sed -i 's/compileSdkVersion .*/compileSdkVersion 35/' android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 35/' android/app/build.gradle

      # الخطوة الثانية: بناء التطبيق مع تحديث الروابط
      - name: Build APK
        run: |
          flutter pub upgrade
          flutter build apk --release --no-tree-shake-icons --build-name=1.0.0 --build-number=1
