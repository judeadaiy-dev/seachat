name: SeaChat Fresh Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Reconstruct Project & Install Dependencies
        run: |
          # 1. احذف android القديم
          rm -rf android
          
          # 2. انشئ android من جديد أول
          flutter create --platforms android --org com.seachat --project-name sea_chat .
          
          # 3. بعدين نزل الـ packages
          flutter pub get
          
          # 4. أضف صلاحية الإنترنت
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET"/>' android/app/src/main/AndroidManifest.xml
          
          # 5. صلاحيات gradlew
          chmod +x android/gradlew

      - name: Fix Gradle for app_links
        run: |
          cat > android/build.gradle << 'EOF'
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          subprojects {
              afterEvaluate { project ->
                  if (project.hasProperty('android')) {
                      project.android {
                          compileSdkVersion 35
                      }
                  }
              }
          }
          EOF
          
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Generate App Icons
        run: |
          flutter pub run flutter_launcher_icons
          
      - name: Build Debug APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Fresh-Debug-APK
          path: build/app/outputs/flutter-apk/app-debug.apk
