name: Force Build Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter 3.24.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Pre-build Clean
        run: |
          flutter clean
          rm -f pubspec.lock

      - name: Backup & Recreate Structure
        run: |
          mkdir -p /tmp/backup
          cp -r lib /tmp/backup/
          cp -r assets /tmp/backup/ 2>/dev/null || true
          cp pubspec.yaml /tmp/backup/
          rm -rf android ios linux macos windows web
          flutter create --org com.seachat --project-name seachat --platforms=android .
          rm -rf lib
          cp -r /tmp/backup/lib ./
          cp -r /tmp/backup/assets ./ 2>/dev/null || true
          cp /tmp/backup/pubspec.yaml ./

      - name: Fix Dependencies & Session Persistence
        run: |
          # إضافة المكتبات الضرورية لحفظ الجلسة والتنقل
          flutter pub add shared_preferences
          
          # تعديل pubspec لحل التعارضات
          sed -i '/dependency_overrides:/d' pubspec.yaml
          cat >> pubspec.yaml << 'EOF'

          dependency_overrides:
            app_links: 6.3.2
            uuid: ^4.4.0
            shared_preferences: ^2.3.2
          EOF

      - name: Configure Android SDK & Gradle
        run: |
          # تحديث Kotlin وإصدارات الـ SDK لضمان التوافق مع الأندرويد الحديث
          sed -i 's/id "org.jetbrains.kotlin.android" version ".*" apply false/id "org.jetbrains.kotlin.android" version "1.9.22" apply false/' android/settings.gradle
          sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 35/g' android/app/build.gradle
          sed -i 's/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 35/g' android/app/build.gradle
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' android/app/build.gradle
          # تفعيل دعم الـ MultiDex إذا كبر حجم التطبيق
          sed -i 's/defaultConfig {/defaultConfig {\n        multiDexEnabled true/' android/app/build.gradle

      - name: Fix Android Manifest (Session & Navigation)
        run: |
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <application
                  android:label="SeaChat"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:allowBackup="true"
                  android:fullBackupContent="true"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
              </application>
          </manifest>
          EOF

      - name: Final Pub Get
        run: flutter pub get

      - name: Build APK (Release Mode)
        run: |
          # بناء ملف APK حقيقي وليس ملف مضغوط
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Installable-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
