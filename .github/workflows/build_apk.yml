name: Force Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter 3.24.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Backup source code
        run: |
          mkdir -p /tmp/backup
          cp -r lib /tmp/backup/
          cp -r assets /tmp/backup/ 2>/dev/null || true
          cp pubspec.yaml /tmp/backup/

      - name: Delete all platform folders
        run: rm -rf android ios linux macos windows web

      - name: Recreate Android project with latest AGP
        run: flutter create --org com.seachat --project-name seachat --platforms=android .

      - name: Restore source code
        run: |
          rm -rf lib
          cp -r /tmp/backup/lib ./
          cp -r /tmp/backup/assets ./ 2>/dev/null || true
          cp /tmp/backup/pubspec.yaml ./

      - name: Force Kotlin 1.9.22 for shared_preferences_android
        run: |
          sed -i 's/id "org.jetbrains.kotlin.android" version ".*" apply false/id "org.jetbrains.kotlin.android" version "1.9.22" apply false/' android/settings.gradle

      - name: Force compileSdkVersion 34 for app_links
        run: |
          sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 34/g' android/app/build.gradle
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' android/app/build.gradle
          sed -i 's/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 34/g' android/app/build.gradle

      - name: Fix pubspec - add icons + override bad deps
        run: |
          sed -i '/^flutter_launcher_icons:/,$d' pubspec.yaml
          cat >> pubspec.yaml << 'EOF'

          flutter_launcher_icons:
            android: true
            ios: false
            image_path: "assets/icons/app_icon.png"
            min_sdk_android: 21
            adaptive_icon_background: "#CAD5D4"
            adaptive_icon_foreground: "assets/icons/app_icon.png"
          
          dependency_overrides:
            app_links: 6.3.2
          EOF

      - name: Overwrite AndroidManifest.xml
        run: |
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />
              <uses-permission android:name="android.permission.CAMERA" />
              <application
                  android:label="SeaChat"
                  android:name="${applicationName}"
                  android:icon="@mipmap/launcher_icon"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <intent-filter android:autoVerify="true">
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
              </application>
          </manifest>
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Generate app icons
        run: dart run flutter_launcher_icons

      - name: Build APK Release - ignore warnings
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
