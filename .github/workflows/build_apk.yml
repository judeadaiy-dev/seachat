name: Fixed Force Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Preparation
        run: |
          flutter clean
          rm -rf android
          # إعادة إنشاء المشروع بضبط إعدادات الأندرويد لنسخة 34 فوراً
          flutter create . --platforms android --org com.your.package
          
          # تحديث المكتبات لضمان توافقها مع Flutter 3.24
          flutter pub upgrade
          flutter pub get

      - name: Inject Android Settings
        run: |
          # هذه الأوامر تقوم بحقن إعدادات الـ SDK داخل ملف build.gradle يدوياً
          sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 34/g' android/app/build.gradle
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' android/app/build.gradle
          sed -i 's/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 34/g' android/app/build.gradle
          
          # معالجة مشكلة مكتبة app_links تحديداً عبر إنشاء ملف local.properties بشكل صحيح
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "flutter.sdk=/opt/hostedtoolcache/flutter/stable-3.24.0-x64" >> android/local.properties

      - name: Build APK
        # استخدام --no-pub لضمان استخدام ما تم تحميله وتحديثه في الخطوات السابقة
        run: flutter build apk --release --no-pub

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
