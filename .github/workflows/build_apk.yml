name: Build My Real SeaChat APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          cache: true

      - name: Prepare Android Environment
        run: |
          # 1. التأكد من وجود مجلد أندرويد أو إنشاؤه إذا فقد
          if [ ! -d "android" ]; then
            flutter create --platforms=android .
          fi

          # 2. تنظيف ملفات الكاش القديمة
          flutter clean
          
          # 3. تحديث الأذونات وإصدارات الـ SDK في ملفات المشروع الحقيقية
          GRADLE_PATH="android/app/build.gradle"
          if [ -f "$GRADLE_PATH" ]; then
            sed -i 's/minSdkVersion .*/minSdkVersion 24/' $GRADLE_PATH
            sed -i 's/targetSdkVersion .*/targetSdkVersion 34/' $GRADLE_PATH
          fi

          # 4. إضافة إذن الإنترنت للمانيفيست الأصلي
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "android.permission.INTERNET" "$MANIFEST_PATH"; then
            sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />' "$MANIFEST_PATH"
          fi

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: |
          # بناء APK يشمل كل المعماريات لضمان اشتغاله على هاتفك
          flutter build apk --debug --target-platform android-arm,android-arm64,android-x64

      - name: Verify APK Integrity
        run: |
          APK_PATH="build/app/outputs/flutter-apk/app-debug.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "Error: APK file not found!"
            exit 1
          fi
          
          SIZE=$(stat -c%s "$APK_PATH")
          echo "Final APK Size: $SIZE bytes"
          
          # إذا كان الحجم أقل من 5 ميجابايت (يعني فشل البناء الحقيقي)
          if [ $SIZE -lt 5000000 ]; then
            echo "Error: Built APK is too small (fake/empty)."
            exit 1
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Your-Actual-App
          path: build/app/outputs/flutter-apk/app-debug.apk
