name: SeaChat Fresh Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Reconstruct Project
        run: |
          rm -rf android
          flutter create --platforms android --org com.seachat --project-name sea_chat .
          flutter pub get
          
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET"/>' android/app/src/main/AndroidManifest.xml
          chmod +x android/gradlew

      - name: Fix Gradle - No afterEvaluate
        run: |
          # 1. صلح android/app/build.gradle مباشر
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' android/app/build.gradle
          sed -i 's/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 35/g' android/app/build.gradle
          sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 35/g' android/app/build.gradle
          
          # 2. صلح android/build.gradle الرئيسي - بدون afterEvaluate
          cat > android/build.gradle << 'EOF'
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          
          rootProject.buildDir = "../build"
          
          subprojects {
              project.buildDir = "${rootProject.buildDir}/${project.name}"
          }
          
          subprojects {
              project.evaluationDependsOn(":app")
          }
          
          tasks.register("clean", Delete) {
              delete rootProject.buildDir
          }
          
          // هذا السطر يحل مشكلة app_links
          gradle.projectsEvaluated {
              subprojects {
                  if (it.hasProperty('android')) {
                      it.android.compileSdkVersion 35
                  }
              }
          }
          EOF
          
          # 3. local.properties
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties

      - name: Generate App Icons
        run: |
          flutter pub run flutter_launcher_icons
          
      - name: Build Debug APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Fresh-Debug-APK
          path: build/app/outputs/flutter-apk/app-debug.apk
