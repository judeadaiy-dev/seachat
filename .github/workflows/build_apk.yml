name: Build Flutter APK Release

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      # 1. جلب المكتبات (بما فيها cached_network_image وغيرها)
      - name: Get dependencies
        run: flutter pub get

      # 2. بناء الـ APK (سيستخدم ملف AndroidManifest.xml الخاص بك تلقائياً)
      - name: Build APK Release
        run: flutter build apk --release --split-per-abi

      # 3. رفع ملفات الـ APK لتتمكن من تحميلها
      - name: Upload APK - arm64
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-arm64-v8a
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk

      - name: Upload APK - Universal
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Universal
          path: build/app/outputs/flutter-apk/app-release.apk
