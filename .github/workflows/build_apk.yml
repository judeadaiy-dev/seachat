name: SeaChat Optimized Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter 3.24.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          cache: true

      # 1. توليد الأيقونات لنظام أندرويد فقط (تم إيقاف iOS لمنع الخطأ)
      - name: Generate App Icons
        run: |
          flutter pub add --dev flutter_launcher_icons
          cat > flutter_launcher_icons.yaml << 'EOF'
          flutter_launcher_icons:
            android: true
            ios: false
            image_path: "assets/icons/app_icon.png" 
          EOF
          flutter pub get
          dart run flutter_launcher_icons

      # 2. ضمان وجود مكتبات حفظ الجلسة (Session)
      - name: Session Persistence Setup
        run: |
          flutter pub add shared_preferences
          flutter pub get

      # 3. بناء الـ APK بالاعتماد على تعديلاتك اليدوية (SDK 35 & Kotlin 1.9.24)
      - name: Build Release APK
        run: |
          # بناء ملف APK واحد شامل ومستقر
          flutter build apk --release --no-tree-shake-icons

      # 4. رفع الملف الناتج بصيغة APK مباشرة
      - name: Upload Installable APK
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-App-Release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
