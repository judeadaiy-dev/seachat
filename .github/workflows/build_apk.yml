name: Ultimate Unified Build
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 1. تنظيف شامل وإنشاء بيئة الأندرويد من الصفر
      - name: Clean and Create Android
        run: |
          flutter clean
          rm -rf android
          flutter create . --platforms android

      # 2. حقن إعدادات SDK 35 والـ Namespace برمجياً
      - name: Master Patch for SDK 35
        run: |
          echo "subprojects {
              afterEvaluate { project ->
                  if (project.hasProperty('android')) {
                      project.android {
                          if (namespace == null) { namespace 'com.judeadaiy.seachat' }
                          compileSdkVersion 35
                          defaultConfig {
                              minSdkVersion 23
                              targetSdkVersion 35
                              multiDexEnabled true
                          }
                      }
                  }
              }
          }" >> android/build.gradle

      # 3. تثبيت المكتبات وبناء الـ APK النهائي
      - name: Final Build APK
        run: |
          flutter pub get
          flutter build apk --release --suppress-analytics --android-skip-build-dependency-validation

      # 4. التحقق والبحث عن الملف لضمان الرفع
      - name: Verify and Prepare Artifact
        if: always()
        run: |
          mkdir -p build/out
          if [ -f build/app/outputs/flutter-apk/app-release.apk ]; then
            cp build/app/outputs/flutter-apk/app-release.apk build/out/seachat-app.apk
            echo "✅ APK Found in standard path."
          else
            echo "⚠️ APK not in standard path, searching everywhere..."
            find build -name "*.apk" -exec cp {} build/out/seachat-app.apk \; || true
          fi

      # 5. الرفع النهائي (تأكد من إزاحة path و if-no-files-found بمقدار مسافتين عن with)
      - name: Upload Verified APK
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Final-Build
          path: build/out/seachat-app.apk
          if-no-files-found: error
