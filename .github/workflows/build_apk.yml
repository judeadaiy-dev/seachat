name: Build SeaChat APK - Ultimate Beast V2

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 2. Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Setup Flutter 3.24.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5' # نسخة مستقرة وحديثة
          channel: 'stable'
          cache: true

      - name: 4. Nuke and Rebuild Android - Sync with Pubspec
        run: |
          # مسح المجلدات القديمة
          rm -rf android .dart_tool build
          
          # إنشاء الأندرويد من جديد ليتطابق مع اسم المشروع sea_chat
          flutter create --platforms=android --org com.seachat --project-name sea_chat .
          
          # حقن التجاوزات (Overrides) مباشرة في الملف لضمان عدم تعارض record_linux
          # السكربت سيقوم بتحديث pubspec.yaml تلقائياً
          flutter pub get

      - name: 5. Hard-Fix Gradle & SDK 35
        run: |
          # إنشاء ملف local.properties لتعريف الـ SDK يدوياً
          cat > android/local.properties << EOF
          sdk.dir=$ANDROID_SDK_ROOT
          flutter.sdk=$FLUTTER_ROOT
          flutter.compileSdkVersion=35
          flutter.targetSdkVersion=35
          flutter.minSdkVersion=21
          EOF
          
          # تعديل app/build.gradle ليتعرف على المتغيرات الجديدة
          APP_GRADLE="android/app/build.gradle"
          sed -i 's/compileSdk = .*/compileSdk = 35/' $APP_GRADLE
          sed -i 's/targetSdk = .*/targetSdk = 35/' $APP_GRADLE
          sed -i 's/minSdk = .*/minSdk = 21/' $APP_GRADLE

      - name: 6. Inject All Permissions (Camera, Mic, Storage)
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # إضافة التصاريح المطلوبة للمكتبات (record, image_picker)
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.RECORD_AUDIO" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.CAMERA" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28" />' $MANIFEST
          
          # دعم الروابط (App Links) والشبكة
          sed -i 's/<application/<application android:usesCleartextTraffic="true"/' $MANIFEST

      - name: 7. Build Release APK - Beast Mode
        run: |
          # تنظيف نهائي وبناء
          flutter clean
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

      - name: 8. Upload SeaChat APK
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Official-Release
          path: build/app/outputs/flutter-apk/app-release.apk

