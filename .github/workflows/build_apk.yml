name: Build SeaChat DEBUG APK - Android 13 Plus

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'
          cache: true

      - name: Configure and Build
        run: |
          set -e
          
          # 1. تنظيف شامل للمشروع
          flutter clean
          
          # 2. ضبط أندرويد لاستهداف إصدارات 13 و 14
          # نقوم بتعديل ملف build.gradle لرفع إصدار الـ SDK
          GRADLE_FILE="android/app/build.gradle"
          if [ -f "$GRADLE_FILE" ]; then
            sed -i 's/compileSdkVersion .*/compileSdkVersion 34/' $GRADLE_FILE
            sed -i 's/targetSdkVersion .*/targetSdkVersion 34/' $GRADLE_FILE
            sed -i 's/minSdkVersion .*/minSdkVersion 24/' $GRADLE_FILE
          fi

          # 3. تحديث الـ Manifest ليتوافق مع متطلبات أندرويد 13 (Permissions)
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          mkdir -p android/app/src/main
          cat > $MANIFEST_PATH << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.judea.sea_chat">
              
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <!-- أذونات أندرويد 13 للوصول للملفات -->
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />
              <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />
              <uses-permission android:name="android.permission.READ_MEDIA_AUDIO" />
              <!-- إذن الإشعارات لأندرويد 13+ -->
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />

              <application
                  android:label="SeaChat"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|screenSize|smallestScreenSize|screenLayout|density|kbNavigation"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                        android:name="io.flutter.embedding.android.NormalTheme"
                        android:resource="@style/NormalTheme"
                        />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
              </application>
          </manifest>
          EOF

          # 4. بناء الـ APK
          flutter pub get
          flutter build apk --debug --target-platform android-arm64
          
          # التأكد من المسار الصحيح للرفع
          mv build/app/outputs/flutter-apk/app-debug.apk build/app/outputs/flutter-apk/SeaChat_Android13_Plus.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Android13-Up
          path: build/app/outputs/flutter-apk/SeaChat_Android13_Plus.apk
