name: SeaChat Ultimate Build Fix

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Hard Cleanup & SDK Injection
        run: |
          # 1. حذف شامل لأي ملفات قفل أو كاش قديمة
          flutter clean
          rm -rf pubspec.lock
          rm -rf .dart_tool
          
          # 2. إزالة مكتبة app_links من ملف pubspec برمجياً لقطع علاقتها بالمشروع
          sed -i '/app_links:/d' pubspec.yaml
          
          # 3. إعادة إنشاء مجلد أندرويد ليكون نظيفاً تماماً
          rm -rf android
          flutter create . --platforms android --org com.seachat.app
          
          # 4. إعداد ملف local.properties لربط مسارات Flutter و Android
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
          
          # 5. حقن إصدار SDK 35 (وإصلاح مشكلة record_android)
          # سنقوم بتحديث ملف build.gradle الرئيسي لتعريف مسار flutter لكل المكتبات الفرعية
          sed -i "1i def flutterRoot = '$FLUTTER_ROOT'" android/build.gradle
          
          # تحديث إصدارات الـ SDK في ملف التطبيق
          sed -i 's/compileSdkVersion .*/compileSdkVersion 35/' android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 35/' android/app/build.gradle

      - name: Build APK
        run: |
          flutter pub get
          # بناء التطبيق مع تجاهل أيقونات iOS
          flutter build apk --release --no-tree-shake-icons
