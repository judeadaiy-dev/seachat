name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Create Android Project Files
        run: flutter create --platforms=android --org com.seachat --project-name seachat .

      - name: Fix pubspec.yaml - Remove duplicates
        run: |
          # احذف أي flutter_launcher_icons قديم عشان ما يتكرر
          sed -i '/^flutter_launcher_icons:/,$d' pubspec.yaml
          
          # ضيف النسخة الصح مرة وحدة بس
          cat >> pubspec.yaml << 'EOF'

          flutter_launcher_icons:
            android: true
            ios: false
            image_path: "assets/icons/app_icon.png"
            min_sdk_android: 21
            adaptive_icon_background: "#CAD5D4"
            adaptive_icon_foreground: "assets/icons/app_icon.png"
          EOF

      - name: Overwrite AndroidManifest.xml
        run: |
          mkdir -p android/app/src/main
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />
              <uses-permission android:name="android.permission.CAMERA" />
              <application
                  android:label="SeaChat"
                  android:name="${applicationName}"
                  android:icon="@mipmap/launcher_icon"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <intent-filter android:autoVerify="true">
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
              </application>
          </manifest>
          EOF

      - name: Get dependencies
        run: flutter pub get

      - name: Generate App Icons
        run: flutter pub run flutter_launcher_icons

      - name: Build APK Release
        run: flutter build apk --release --no-shrink

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-APK
          path: build/app/outputs/flutter-apk/app-release.apk
