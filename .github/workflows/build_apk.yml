name: SeaChat Ultimate Force Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: The Nuclear Option (Cleanup & Force Build)
        run: |
          # 1. مسح شامل لكل الكاش وملفات القفل لقطع الطريق على app_links
          flutter clean
          rm -f pubspec.lock
          rm -rf .dart_tool
          
          # 2. حذف مجلد أندرويد بالكامل لإزالة أي إعدادات قديمة مرتبطة بالمكتبة
          rm -rf android
          
          # 3. إعادة إنشاء مجلد أندرويد نظيف ومعرف بـ SeaChat
          flutter create . --platforms android --org com.seachat.app
          
          # 4. حقن مسار Flutter يدوياً في ملفات Gradle لحل مشكلة unknown property flutter
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
          
          # 5. إجبار نظام أندرويد على استخدام SDK 35 لدعم مكتبات الصوت والصور
          sed -i 's/compileSdkVersion .*/compileSdkVersion 35/' android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 35/' android/app/build.gradle
          
          # 6. حقن تعريف flutterRoot في ملف build.gradle الرئيسي لضمان رؤية جميع المكتبات له
          sed -i "1i def flutterRoot = '$FLUTTER_ROOT'" android/build.gradle

      - name: Final Execution
        run: |
          # تحميل المكتبات الجديدة فقط (بدون app_links)
          flutter pub get
          # بناء APK النسخة النهائية وتجاهل مشاكل الأيقونات
          flutter build apk --release --no-tree-shake-icons
