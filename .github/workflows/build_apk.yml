name: Ultimate Force Build SeaChat

on:
  push:
    branches: [ "main", "master" ] # سيعمل تلقائياً عند رفع الكود
  workflow_dispatch: # يبقي خيار التشغيل اليدوي متاحاً

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          cache: true

      - name: Nuke Old Android & Ignore Warnings
        run: |
          set +e
          rm -f analysis_options.yaml
          rm -rf android/
          flutter create --platforms=android .
          
      - name: Inject Permissions & Force Configs
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.RECORD_AUDIO" />' $MANIFEST
          sed -i 's/<application/<application android:usesCleartextTraffic="true"/' $MANIFEST
          
          if [ -f "android/app/build.gradle" ]; then
            sed -i 's/minSdkVersion .*/minSdkVersion 24/' android/app/build.gradle
            sed -i 's/targetSdkVersion .*/targetSdkVersion 34/' android/app/build.gradle
          elif [ -f "android/app/build.gradle.kts" ]; then
            sed -i 's/minSdkVersion = .*/minSdkVersion = 24/' android/app/build.gradle.kts
            sed -i 's/targetSdkVersion = .*/targetSdkVersion = 34/' android/app/build.gradle.kts
          fi

      - name: Gather Libraries and Build Real APK
        run: |
          flutter pub get
          set -e
          flutter build apk --debug --target-platform android-arm,android-arm64,android-x64

      - name: Strict Size Verification (Anti-Fake)
        run: |
          APK_PATH="build/app/outputs/flutter-apk/app-debug.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "Error: No APK generated!"
            exit 1
          fi
          SIZE=$(stat -c%s "$APK_PATH")
          echo "Real APK Size is: $SIZE bytes"
          if [ $SIZE -lt 5000000 ]; then
            echo "Error: APK is fake or empty! Size is too small."
            exit 1
          fi

      - name: Upload The Ultimate APK
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Force-Built
          path: build/app/outputs/flutter-apk/app-debug.apk
