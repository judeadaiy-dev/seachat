Name: Build Flutter APK Release

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      # تصحيح: لا تحذف المجلد بالكامل إذا كان يحتوي على ملفاتك المهمة
      - name: Get dependencies
        run: flutter pub get

      # إضافة: التأكد من وجود ملف الخدمات إذا كنت قد رفعته كـ Secret (اختياري)
      # إذا كنت ترفع الملف يدوياً في المستودع، تجاوز هذه الخطوة.

      - name: Build APK Release
        run: flutter build apk --release --split-per-abi

      - name: Upload APK - arm64 (مناسب لأغلب هواتف الأندرويد الحديثة)
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-arm64-v8a
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk

      - name: Upload APK - Universal
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Universal
          path: build/app/outputs/flutter-apk/app-release.apk
