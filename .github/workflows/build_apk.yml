name: Full Android Auto Build
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 1. بناء ملف pubspec.yaml بالمكتبات المطلوبة
      - name: Rebuild pubspec.yaml
        run: |
          cat <<EOF > pubspec.yaml
          name: seachat
          description: A new Flutter project.
          version: 1.0.0+1
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            cupertino_icons: ^1.0.6
            supabase_flutter: ^2.0.0
            image_picker: ^1.1.2
            uuid: ^4.4.0
            app_links: ^6.0.0
            provider: ^6.1.2
            shared_preferences: ^2.2.3
          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_launcher_icons: ^0.13.1
          flutter:
            uses-material-design: true
          EOF

      # 2. توليد مجلد الأندرويد وملفات الإعداد
      - name: Create Android Folder
        run: flutter create . --platforms android

      # 3. تثبيت المكتبات وتوليد الأيقونات (إذا كان الملف مهيأ لها)
      - name: Install Dependencies
        run: |
          flutter pub get
          # تفعيل توليد الأيقونات إذا كانت الإعدادات موجودة
          flutter pub run flutter_launcher_icons:main || echo "No icons config found, skipping..."

      # 4. إصلاح إعدادات Gradle ليتوافق مع النسخ الحديثة
      - name: Patch Gradle Config
        run: |
          echo "subprojects {
              afterEvaluate { project ->
                  if (project.hasProperty('android')) {
                      project.android {
                          if (namespace == null) {
                              namespace 'com.example.seachat'
                          }
                          compileSdkVersion 34
                          defaultConfig {
                              minSdkVersion 23
                              targetSdkVersion 34
                          }
                      }
                  }
              }
          }" >> android/build.gradle

      # 5. بناء الـ APK الرسمي (بدون تخطي الأخطاء)
      - name: Build APK
        run: flutter build apk --release --suppress-analytics

      # 6. نقل الملف لمكان محدد لضمان الرفع
      - name: Prepare Artifact
        run: |
          mkdir -p build/out
          cp build/app/outputs/flutter-apk/app-release.apk build/out/seachat-app.apk

      # 7. رفع الملف النهائي
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Package
          path: build/out/seachat-app.apk
