name: Flutter Clean Build (Go_router)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0' 

      - name: Reconstruct Android
        run: |
          # حذف المجلد القديم نهائياً
          rm -rf android
          # إنشاء مجلد جديد نظيف تماماً
          flutter create . --platforms android --org com.seachat.app
          
          # إعداد ملف الخصائص الأساسي فقط
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
          
          # ضبط الـ SDK على 35 لضمان عمل Supabase (الصور والصوت)
          sed -i 's/compileSdkVersion .*/compileSdkVersion 35/' android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 35/' android/app/build.gradle

      - name: Build APK
        run: |
          flutter pub get
          # بناء التطبيق بدون الحاجة لتعقيدات الروابط العميقة
          flutter build apk --release --no-tree-shake-icons
