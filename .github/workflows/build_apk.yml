name: SeaChat Fresh Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # تحديث لـ v4

      - name: Setup Java
        uses: actions/setup-java@v4 # تحديث لـ v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Reconstruct Project Environment
        run: |
          rm -rf android
          flutter pub get
          flutter create . --platforms android
          
          # إضافة صلاحية الإنترنت للمانيفست
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET"/>' android/app/src/main/AndroidManifest.xml
          
          chmod +x android/gradlew

      - name: Build Debug APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4 # هذا هو الإصلاح المطلوب للخطأ في الصورة
        with:
          name: SeaChat-Fresh-Debug-APK
          path: build/app/outputs/flutter-apk/app-debug.apk
