name: SeaChat Final Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Strict Project Cleanup
        run: |
          # حذف أي إشارة لمكتبة app_links من ملف pubspec.yaml برمجياً
          sed -i '/app_links:/d' pubspec.yaml
          
          # حذف مجلد أندرويد المعطوب وإعادة بنائه
          rm -rf android
          flutter create . --platforms android --org com.seachat.app
          
          # ربط المسارات بشكل صحيح لضمان عمل الحزم الأخرى
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
          
          # ضبط الـ SDK على 35 ليتوافق مع مكتبات الصوت والصور في SeaChat
          sed -i 's/compileSdkVersion .*/compileSdkVersion 35/' android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 35/' android/app/build.gradle

      - name: Install and Build
        run: |
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
