name: SeaChat Structural Reconstruction & Permissions

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Create Android & Inject Configuration
        run: |
          # 1. إعادة إنشاء مجلد أندرويد نظيف متوافق مع نسخة فلاتر 3.24
          rm -rf android
          flutter create . --platforms android --org com.seachat.app
          
          # 2. حقن تصاريح الإنترنت والمايكروفون (إلزامي لـ Supabase و Record)
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # إضافة تصريح الإنترنت
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />' $MANIFEST
          # إضافة تصاريح المايكروفون
          sed -i '/<application/i \    <uses-permission android:name="android.permission.RECORD_AUDIO" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />' $MANIFEST

          # 3. حل مشكلة unknown property 'flutter' و compileSdkVersion (للمكتبات الخارجية)
          # تعريف المسارات يدوياً في local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
          
          # حقن تعريف flutterRoot في ملف build.gradle الرئيسي لضمان رؤية المكتبات له
          sed -i "1i def flutterRoot = '$FLUTTER_ROOT'" android/build.gradle
          
          # 4. إجبار المشروع على استخدام SDK 35 لتجنب تعارضات app_links (التي تطلب 36)
          sed -i 's/compileSdkVersion .*/compileSdkVersion 35/' android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 35/' android/app/build.gradle

      - name: Final Build
        run: |
          flutter pub get
          # بناء APK النسخة النهائية وتخطي الأيقونات المفقودة
          flutter build apk --release --no-tree-shake-icons
