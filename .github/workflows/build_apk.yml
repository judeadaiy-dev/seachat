name: Build SeaChat DEBUG APK - Installable

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'
          cache: true

      - name: Build Debug APK - Guaranteed Installable
        run: |
          set -e
          
          rm -rf android ios .dart_tool pubspec.lock
          flutter create --platforms=android --org com.judea --project-name sea_chat .
          
          # pubspec نظيف بدون Google
          cat > pubspec.yaml << 'EOF'
          name: sea_chat
          description: "A modern glassmorphism chat application powered by Supabase."
          publish_to: 'none'
          version: 1.0.0+1

          environment:
            sdk: ">=3.5.0 <4.0.0"

          dependencies:
            flutter:
              sdk: flutter
            cupertino_icons: ^1.0.8
            supabase_flutter: ^2.8.4
            image_picker: ^1.1.2
            record: ^5.2.1
            just_audio: ^0.9.42
            permission_handler: ^11.3.1
            uuid: ^4.5.1
            path_provider: ^2.1.5
            google_fonts: ^6.2.1

          dev_dependencies:
            flutter_test:
              sdk: flutter

          flutter:
            uses-material-design: true
          EOF
          
          # احذف اي كود Google
          find lib -name "*.dart" -exec sed -i '/google_sign_in/d' {} \;
          find lib -name "*.dart" -exec sed -i '/GoogleSignIn/d' {} \;
          find lib -name "*.dart" -exec sed -i '/signInWithGoogle/d' {} \;
          
          # Supabase config
          mkdir -p lib/config
          cat > lib/config/app_config.dart << 'EOF'
          class AppConfig {
            static const String appName = 'SeaChat';
            static const String supabaseUrl = 'https://jmsmrojtlstppnpwmkkk.supabase.co';
            static const String supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imptc21yb2p0bHN0cHBucHdta2trIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MTg2NDAsImV4cCI6MjA4ODM5NDY0MH0.j7gxr5CvrfvbJJzK_pMwVHiCE2AqpXUTThpeLEBmsos';
          }
          EOF
          
          flutter pub get
          
          # صلاحيات الانترنت
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />' $MANIFEST
          sed -i 's/<application/<application android:usesCleartextTraffic="true"/' $MANIFEST
          sed -i 's/android:label="sea_chat"/android:label="SeaChat"/' $MANIFEST
          
          # ابني Debug APK - هذا موقع تلقائياً ويشتغل على كل الاجهزة
          flutter build apk --debug
          
          echo "=== تفاصيل الـ APK ==="
          ls -lh build/app/outputs/flutter-apk/app-debug.apk
          file build/app/outputs/flutter-apk/app-debug.apk

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-DEBUG-Installable
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
