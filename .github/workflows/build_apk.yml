name: Full Android Auto Build
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Rebuild pubspec.yaml
        run: |
          cat <<EOF > pubspec.yaml
          name: seachat
          description: A new Flutter project.
          version: 1.0.0+1
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            cupertino_icons: ^1.0.6
            supabase_flutter: ^2.0.0
            image_picker: ^1.1.2
            uuid: ^4.4.0
            app_links: ^6.0.0
            provider: ^6.1.2
            shared_preferences: ^2.2.3
          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_launcher_icons: ^0.13.1
          flutter:
            uses-material-design: true
          EOF

      - name: Create Android Folder
        run: flutter create . --platforms android

      - name: Patch Gradle for SDK 36
        run: |
          echo "subprojects {
              afterEvaluate { project ->
                  if (project.hasProperty('android')) {
                      project.android {
                          if (namespace == null) {
                              namespace project.group
                          }
                          compileSdkVersion 36
                          defaultConfig {
                              minSdkVersion 23
                              targetSdkVersion 36
                          }
                      }
                  }
              }
          }" >> android/build.gradle

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK & Organize Output
        run: |
          flutter build apk --release --suppress-analytics --android-skip-build-dependency-validation
          mkdir -p build/out
          # محاولة النسخ من المسارات المحتملة لملف الـ APK
          cp build/app/outputs/flutter-apk/app-release.apk build/out/seachat-app.apk || cp build/app/outputs/apk/release/app-release.apk build/out/seachat-app.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Final-Build
          path: build/out/seachat-app.apk
