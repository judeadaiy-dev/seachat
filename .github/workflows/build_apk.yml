name: SeaChat Final Recovery Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Force Clean & Reconstruct
        run: |
          # 1. تنظيف شامل للملفات المؤقتة
          flutter clean
          rm -rf pubspec.lock
          rm -rf android
          
          # 2. إزالة app_links من pubspec.yaml إذا وجدت (للتأكد فقط)
          sed -i '/app_links:/d' pubspec.yaml
          
          # 3. إعادة إنشاء مجلد أندرويد نظيف تماماً
          flutter create . --platforms android --org com.seachat.app
          
          # 4. حقن إعدادات الـ SDK مباشرة في ملفات أندرويد الناتجة
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
          
          # ضبط compileSdkVersion و targetSdkVersion إلى 35 يدوياً
          sed -i 's/compileSdkVersion .*/compileSdkVersion 35/' android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 35/' android/app/build.gradle

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Release APK
        run: |
          # بناء الـ APK مع تجاهل أي تعارضات في أيقونات المشروع
          flutter build apk --release --no-tree-shake-icons
