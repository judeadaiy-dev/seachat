name: Build Sea Chat APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. سحب الكود
        uses: actions/checkout@v4

      - name: 2. تثبيت Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. تثبيت Flutter 3.24
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: 4. تجديد Android + حل جذري للمكتبات
        run: |
          rm -rf android
          flutter create --platforms=android --org com.seachat .
          
          # حل 1: نثبت الاصدارات في local.properties
          sed -i '/^flutter.minSdkVersion/d' android/local.properties
          sed -i '/^flutter.targetSdkVersion/d' android/local.properties
          sed -i '/^flutter.compileSdkVersion/d' android/local.properties
          echo "flutter.compileSdkVersion=34" >> android/local.properties
          echo "flutter.targetSdkVersion=34" >> android/local.properties
          echo "flutter.minSdkVersion=21" >> android/local.properties
          
          # حل 2: تفعيل multiDex + نثبت compileSdk في build.gradle مباشرة
          sed -i 's/compileSdk flutter.compileSdkVersion/compileSdk 34/' android/app/build.gradle
          sed -i 's/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 34/' android/app/build.gradle
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/' android/app/build.gradle
          sed -i '/defaultConfig {/a \        multiDexEnabled true' android/app/build.gradle

      - name: 5. تثبيت الحزم + حل app_links
        run: |
          # نجبر app_links على اصدار 6.3.2 ما فيه المشكلة
          echo "dependency_overrides:" >> pubspec.yaml
          echo "  app_links: 6.3.2" >> pubspec.yaml
          flutter pub get

      - name: 6. اضافة التصاريح
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/<\/manifest>/d' $MANIFEST
          cat >> $MANIFEST << 'PERMS'
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.CAMERA"/>
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32"/>
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>
              <uses-permission android:name="android.permission.READ_MEDIA_VIDEO"/>
              <uses-permission android:name="android.permission.RECORD_AUDIO"/>
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="29"/>
              <uses-permission android:name="android.permission.WAKE_LOCK"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK"/>
          </manifest>
          PERMS
          sed -i 's/<application/<application android:usesCleartextTraffic="true"/' $MANIFEST

      - name: 7. بناء APK نهائي
        run: flutter build apk --release --no-tree-shake-icons

      - name: 8. رفع الـ APK
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
