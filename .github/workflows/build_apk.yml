name: Ultimate Force Build SeaChat V3

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          cache: true

      - name: Force Clean & Reconstruction
        run: |
          set +e
          # تنظيف البيئة تماماً
          rm -rf android/
          rm -f .dart_tool/package_config.json
          
          # إنشاء مشروع أندرويد جديد يطابق الكود الحالي
          flutter create --platforms=android .
          
          # إعداد ملف local.properties بالقوة (هذا يحل مشكلة app_links)
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties
          echo "flutter.buildMode=debug" >> android/local.properties
          
          # تعديل ملف build.gradle الرئيسي لفرض الإصدارات على كل المكتبات الخارجية (Sub-projects)
          cat >> android/build.gradle << 'EOF'
          subprojects {
              project.evaluationDependsOn(':app')
              project.afterEvaluate {
                  if (project.hasProperty('android')) {
                      android {
                          compileSdkVersion 34
                          buildToolsVersion "34.0.0"
                      }
                  }
              }
          }
          EOF

          # ضبط ملف build.gradle الخاص بالتطبيق
          APP_GRADLE="android/app/build.gradle"
          sed -i 's/compileSdkVersion .*/compileSdkVersion 34/' $APP_GRADLE
          sed -i 's/targetSdkVersion .*/targetSdkVersion 34/' $APP_GRADLE
          sed -i 's/minSdkVersion .*/minSdkVersion 24/' $APP_GRADLE

      - name: Build APK (Bypass Errors)
        run: |
          flutter pub get
          # استخدام --no-pub لتسريع العملية وتجنب تعارض المكاتب
          flutter build apk --debug --target-platform android-arm,android-arm64,android-x64 --no-pub

      - name: Integrity Check & Size Verify
        run: |
          APK_PATH="build/app/outputs/flutter-apk/app-debug.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "Error: APK not found!"
            exit 1
          fi
          SIZE=$(stat -c%s "$APK_PATH")
          echo "Final APK Size: $SIZE bytes"
          if [ $SIZE -lt 5000000 ]; then
            echo "Error: APK is too small (fake build)."
            exit 1
          fi

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Stable-Build
          path: build/app/outputs/flutter-apk/app-debug.apk
