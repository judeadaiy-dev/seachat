name: SeaChat Build - Tank V3

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Setup Flutter 3.24.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: 4. Disable Flutter Analytics
        run: flutter config --no-analytics

      - name: 5. Nuke Old Project Files
        run: |
          rm -rf android ios linux macos windows web .dart_tool build
          
      - name: 6. Create Fresh Android Project
        run: |
          flutter create --platforms android --org com.seachat --project-name sea_chat .

      - name: 7. Install Dependencies
        run: flutter pub get

      - name: 8. Fix Flutter Gradle Properties
        run: |
          # اهم خطوة: نعرف ext.flutter قبل اي شي
          BUILD_GRADLE="android/build.gradle"
          
          # احذف السطر القديم اذا موجود
          sed -i '/ext {/,/}/d' $BUILD_GRADLE
          
          # ضيف تعريف flutter SDK versions ببداية الملف
          cat > temp_gradle << 'EOF'
          buildscript {
              ext.kotlin_version = '1.7.10'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.3.0'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }

          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.buildDir = '../build'
          subprojects {
              project.buildDir = "${rootProject.buildDir}/${project.name}"
          }
          subprojects {
              project.evaluationDependsOn(':app')
          }

          ext {
              flutter = [
                  compileSdkVersion: 35,
                  targetSdkVersion: 35,
                  minSdkVersion: 21
              ]
          }

          tasks.register("clean", Delete) {
              delete rootProject.buildDir
          }
          EOF
          
          mv temp_gradle $BUILD_GRADLE
          
      - name: 9. Add Permissions + Fix App Gradle
        run: |
          # صلاحيات
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET" />' $MANIFEST
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.CAMERA" />' $MANIFEST
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.RECORD_AUDIO" />' $MANIFEST
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />' $MANIFEST
          
          # تعديل app/build.gradle ليستخدم ext.flutter
          APP_GRADLE="android/app/build.gradle"
          sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion flutter.compileSdkVersion/g' $APP_GRADLE
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion flutter.minSdkVersion/g' $APP_GRADLE
          sed -i 's/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion flutter.targetSdkVersion/g' $APP_GRADLE
          
          chmod +x android/gradlew
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties
          
      - name: 10. Build Debug APK
        run: flutter build apk --debug

      - name: 11. Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Debug-APK
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14
