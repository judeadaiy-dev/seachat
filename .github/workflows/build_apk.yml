name: Build SeaChat APK - Ultimate Beast V5

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 2. Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Setup Flutter 3.24.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: 4. Nuke and Rebuild Android Structure
        run: |
          rm -rf android .dart_tool build
          flutter create --platforms=android --org com.seachat --project-name sea_chat .
          flutter pub get

      - name: 5. Fix BuildScript & Plugin Repositories
        run: |
          # تعديل الملف الرئيسي لضمان تعريف مستودعات الإضافات
          cat > android/build.gradle << 'EOF'
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.buildDir = '../build'
          subprojects {
              project.buildDir = "${rootProject.buildDir}/${project.name}"
          }
          subprojects {
              project.evaluationDependsOn(':app')
          }
          tasks.register("clean", Delete) {
              delete rootProject.buildDir
          }
          EOF

      - name: 6. Patch Settings Gradle (The Modern Way)
        run: |
          # إعادة هيكلة ملف الإعدادات ليتوافق مع فلاتر 3.24.5 ويحل مشكلة Plugin Not Found
          cat > android/settings.gradle << 'EOF'
          pluginManagement {
              def flutterSdkPath = {
                  def properties = new Properties()
                  file("local.properties").withInputStream { properties.load(it) }
                  def flutterSdkPath = properties.getProperty("flutter.sdk")
                  if (flutterSdkPath == null) throw new GradleException("flutter.sdk not set in local.properties")
                  return flutterSdkPath
              }()

              includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          plugins {
              id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
              id "com.android.application" version "8.1.0" apply false
              id "org.jetbrains.kotlin.android" version "1.8.22" apply false
          }

          include ":app"
          EOF

      - name: 7. Force SDK 35 in local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties
          echo "flutter.compileSdkVersion=35" >> android/local.properties
          echo "flutter.targetSdkVersion=35" >> android/local.properties
          echo "flutter.minSdkVersion=21" >> android/local.properties

      - name: 8. Build Release APK
        run: |
          flutter clean
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

      - name: 9. Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Beast-V5
          path: build/app/outputs/flutter-apk/app-release.apk
