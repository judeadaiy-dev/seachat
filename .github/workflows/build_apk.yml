name: Build SeaChat APK - Fast

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3' # يدعم Dart 3.5.0 من pubspec.yaml
          channel: 'stable'
          cache: true

      - name: Download Cairo Font
        run: |
          mkdir -p fonts assets
          # Regular 400
          curl -sL -o fonts/Cairo-Regular.ttf "https://github.com/google/fonts/raw/main/ofl/cairo/static/Cairo-Regular.ttf"
          # Bold 700  
          curl -sL -o fonts/Cairo-Bold.ttf "https://github.com/google/fonts/raw/main/ofl/cairo/static/Cairo-Bold.ttf"

      - name: Nuke and Rebuild Android - Fast
        run: |
          rm -rf android
          flutter create --platforms=android --org com.judea --project-name sea_chat . > /dev/null 2>&1
          
          # بدون dependency_overrides - النسخ الجديدة متوافقة
          
          cat > android/local.properties << EOF
          sdk.dir=$ANDROID_SDK_ROOT
          flutter.sdk=$FLUTTER_ROOT
          flutter.buildMode=release
          flutter.versionName=1.0.0
          flutter.versionCode=1
          flutter.compileSdkVersion=35
          flutter.targetSdkVersion=35
          flutter.minSdkVersion=21
          flutter.ndkVersion=25.1.8937393
          EOF
          
          cat >> android/gradle.properties << EOF
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
          android.defaults.buildfeatures.buildconfig=true
          android.nonTransitiveRClass=true
          android.nonFinalResIds=true
          EOF
          
          sed -i '/^} \/\* pluginManagement \*\//a\\ninclude ":app"\n\ndef localProperties = new Properties()\ndef localPropertiesFile = new File(settingsDir, "local.properties")\nif (localPropertiesFile.exists()) { localPropertiesFile.withReader("UTF-8") { reader -> localProperties.load(reader) } }\ngradle.ext.flutterCompileSdkVersion = localProperties.getProperty("flutter.compileSdkVersion")\ngradle.ext.flutterTargetSdkVersion = localProperties.getProperty("flutter.targetSdkVersion")\ngradle.ext.flutterMinSdkVersion = localProperties.getProperty("flutter.minSdkVersion")' android/settings.gradle
          
          flutter clean > /dev/null 2>&1
          flutter pub get > /dev/null 2>&1

      - name: Inject All Permissions + Manifest Fixes
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.RECORD_AUDIO" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.READ_MEDIA_AUDIO" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />' $MANIFEST
          sed -i 's/<application/<application android:usesCleartextTraffic="true" android:requestLegacyExternalStorage="true" android:largeHeap="true"/' $MANIFEST
          sed -i 's/android:label="sea_chat"/android:label="SeaChat"/' $MANIFEST

      - name: Create app_config.dart
        run: |
          mkdir -p lib/config
          cat > lib/config/app_config.dart << 'EOF'
          class AppConfig {
            static const String appName = 'SeaChat';
            static const String supabaseUrl = 'https://jmsmrojtlstppnpwmkkk.supabase.co';
            static const String supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imptc21yb2p0bHN0cHBucHdta2trIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MTg2NDAsImV4cCI6MjA4ODM5NDY0MH0.j7gxr5CvrfvbJJzK_pMwVHiCE2AqpXUTThpeLEBmsos';
            static const String copyrightYear = '2026';
            static const String copyrightName = 'JudeaDay';
          }
          EOF

      - name: Build App Icons
        run: flutter pub run flutter_launcher_icons > /dev/null 2>&1 || true

      - name: Build Release APK - Fast
        run: |
          set +e
          flutter build apk --release --no-tree-shake-icons > build.log 2>&1
          if [ $? -ne 0 ]; then
            echo "=== BUILD FAILED - FATAL ERRORS ONLY ==="
            grep -E "Error:|FAILURE:|Exception:|Error executing|Could not|Execution failed" build.log || cat build.log
            exit 1
          else
            echo "Build successful"
          fi

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-APK-v1.0.0
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
