name: Ultimate Auto Build
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # الخطوة المفصلية: إنشاء المشروع من الصفر غصباً عن الظروف
      - name: Force Initialize Android
        run: |
          rm -rf android
          flutter create . --platforms android --force
          # التأكد من أن المجلد تم إنشاؤه فعلاً قبل الانتقال للخطوة التالية
          if [ ! -d "android" ]; then echo "CRITICAL ERROR: Android folder NOT created"; exit 1; fi

      - name: Patch Gradle (Safe Mode)
        run: |
          # إضافة Namespace وإعدادات الـ SDK فقط إذا وجد الملف
          if [ -f "android/build.gradle" ]; then
            echo "subprojects {
                afterEvaluate { project ->
                    if (project.hasProperty('android')) {
                        project.android {
                            if (namespace == null) { namespace 'com.judeadaiy.seachat' }
                            compileSdkVersion 35
                            defaultConfig {
                                minSdkVersion 23
                                targetSdkVersion 35
                                multiDexEnabled true
                            }
                        }
                    }
                }
            }" >> android/build.gradle
          fi

      - name: Build APK (Ignoring Errors)
        run: |
          flutter pub get
          # استخدام flag إضافي لتجاوز تعارضات التراخيص و CMake
          flutter build apk --release --suppress-analytics --no-pub --android-skip-build-dependency-validation || true

      - name: Secure and Deliver APK
        if: always()
        run: |
          mkdir -p build/out
          # بحث شامل في كل مكان (Recursive Find)
          find . -name "*.apk" -exec cp {} build/out/seachat-app.apk \; || true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Final-Package
          path: build/out/seachat-app.apk
