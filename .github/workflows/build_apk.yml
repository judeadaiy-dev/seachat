name: Rebuild and Build APK

on:
  push:
    branches:
      - main  # أو اسم الفرع الذي تستخدمه في مستودع dood

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0' # إصدار حديث يتوافق مع متطلبات مشروعك

      - name: Recreate Android Folder
        run: |
          rm -rf android
          flutter create . --platforms android
          # هذا الأمر يضمن إعادة إنشاء الملفات مع الهوية الصحيحة لمشروع SeaChat

      - name: Add Internet Permissions
        run: |
          # إضافة تصريح الإنترنت لضمان عمل Supabase (الصور، الصوت، الرسائل)
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />' android/app/src/main/AndroidManifest.xml
          sed -i '/<application/i \    <uses-permission android:name="android.permission.RECORD_AUDIO" />' android/app/src/main/AndroidManifest.xml

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons
