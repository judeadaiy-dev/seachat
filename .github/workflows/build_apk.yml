name: SeaChat Professional Build V5

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          cache: true

      - name: Reconstruct Modern Android Environment
        run: |
          # 1. حذف المجلد القديم لضمان عدم وجود ملفات مكسورة
          rm -rf android/
          
          # 2. إنشاء مشروع أندرويد جديد بأحدث المعايير (Declarative Support)
          flutter create --platforms=android --org com.judea --project-name sea_chat .
          
          # 3. إعداد ملف local.properties بشكل صحيح وشامل
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties
          
          # 4. حل مشكلة compileSdkVersion للمكتبات الخارجية (app_links وغيرها)
          # نقوم بتعديل ملف build.gradle الرئيسي لفرض الإعدادات على المشاريع الفرعية
          cat > android/build.gradle << 'EOF'
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.buildDir = '../build'
          subprojects {
              project.buildDir = "${rootProject.buildDir}/${project.name}"
              afterEvaluate { project ->
                  if (project.hasProperty('android')) {
                      project.android {
                          if (namespace == null) {
                              namespace project.group
                          }
                          compileSdkVersion 34
                          buildToolsVersion "34.0.0"
                      }
                  }
              }
          }
          subprojects {
              project.evaluationDependsOn(':app')
          }
          tasks.register("clean", Delete) {
              delete rootProject.buildDir
          }
          EOF

          # 5. ضبط إعدادات تطبيقك (minSdkVersion) وتفعيل الإنترنت
          sed -i 's/minSdkVersion .*/minSdkVersion 24/' android/app/build.gradle
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />' $MANIFEST

      - name: Clean & Get Packages
        run: |
          flutter clean
          flutter pub get

      - name: Build Actual APK
        run: |
          # بناء APK ديبيج شامل (Debug APK)
          flutter build apk --debug --target-platform android-arm,android-arm64,android-x64

      - name: Final Verification
        run: |
          APK_PATH="build/app/outputs/flutter-apk/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            echo "Success! APK Size: $(stat -c%s "$APK_PATH") bytes"
          else
            echo "Error: Build process failed to create APK file."
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Stable-V5
          path: build/app/outputs/flutter-apk/app-debug.apk
