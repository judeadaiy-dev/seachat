name: SeaChat Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Build Android Parts Only
        run: |
          # تأكد من حذف أي ملفات أندرويد قديمة قد تسبب تعارضاً
          rm -rf android
          
          # أمر الإصلاح الذكي (يضيف مجلد أندرويد دون تغيير pubspec)
          flutter create . --platforms android --org com.seachat.app
          
          # ربط المسارات للـ SDK
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
          
          # تحديث إعدادات الـ SDK لـ 35
          sed -i 's/compileSdkVersion .*/compileSdkVersion 35/' android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 35/' android/app/build.gradle

      - name: Install and Build
        run: |
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
