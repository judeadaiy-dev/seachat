name: SeaChat Build - Clean Android Tank V6

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Setup Flutter 3.24.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: 4. Nuke and Rebuild Android Project
        run: |
          # مسح مجلد أندرويد القديم وأي ملفات بناء سابقة تماماً
          rm -rf android build .dart_tool
          
          # إنشاء مجلد أندرويد جديد ونظيف يعتمد على ملف pubspec.yaml الخاص بك
          flutter create --platforms android --org com.seachat --project-name sea_chat .
          
          # جلب المكتبات
          flutter pub get

      - name: 5. Force Gradle to Use SDK 35 & Local Paths
        run: |
          # تعريف مسارات Flutter SDK للسيرفر ليتعرف عليها Gradle والإضافات
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties
          
          # تعديل ملف app/build.gradle ليستخدم SDK 35 مباشرة
          # هذا يحل مشكلة app_links و record_android
          APP_GRADLE="android/app/build.gradle"
          sed -i 's/compileSdk = .*/compileSdk = 35/' $APP_GRADLE
          sed -i 's/targetSdk = .*/targetSdk = 35/' $APP_GRADLE
          sed -i 's/minSdk = .*/minSdk = 21/' $APP_GRADLE

      - name: 6. Add Essential Permissions
        run: |
          # إضافة تصاريح الإنترنت والكاميرا والصوت للملف الجديد
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET" />' $MANIFEST
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.CAMERA" />' $MANIFEST
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.RECORD_AUDIO" />' $MANIFEST

      - name: 7. Build Debug APK
        run: |
          # بناء التطبيق مع تجاهل فحص الأخطاء البرمجية (lint) للسرعة
          flutter build apk --debug --no-pub

      - name: 8. Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-New-Android-Build
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 5
