name: Flutter Auto-Build SeaChat

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Repair Android Project
        run: |
          # 1. تنظيف أي آثار قديمة لمكتبة app_links
          flutter pub remove app_links || true
          
          # 2. إنشاء مجلد أندرويد فقط دون لمس ملف pubspec.yaml الأصلي
          flutter create . --platforms android --org com.seachat.app
          
          # 3. ربط المسارات بشكل صحيح
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
          
          # 4. تحديث الـ SDK ليتوافق مع مكتبات الصوت والصور في SeaChat
          sed -i 's/compileSdkVersion .*/compileSdkVersion 35/' android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 35/' android/app/build.gradle

      - name: Install Dependencies
        run: |
          # التأكد من تحميل كافة مكتباتك المذكورة في pubspec
          flutter pub get

      - name: Build APK
        run: |
          # بناء التطبيق النهائي
          flutter build apk --release --no-tree-shake-icons
