name: Flutter Auto-Build SeaChat

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Repair and Reconstruct Android
        run: |
          # 1. إزالة أي مكتبات مسببة للمشاكل برمجياً لضمان نظافة المشروع
          flutter pub remove app_links || true
          
          # 2. إصلاح مجلد أندرويد فقط دون التأثير على ملف pubspec.yaml الأصلي
          # نستخدم أمر التحديث لضمان عدم حذف بياناتك
          flutter create . --platforms android --org com.seachat.app
          
          # 3. إنشاء ملف الخصائص لربط المسارات (ضروري لنجاح البناء)
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
          
          # 4. ضبط إصدار الـ SDK على 35 لدعم مكتبات الصوت والصور في SeaChat
          # استخدمنا مسارات دقيقة لضمان وصول الأمر للملفات المطلوبة
          sed -i 's/compileSdkVersion .*/compileSdkVersion 35/' android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 35/' android/app/build.gradle

      - name: Install Dependencies
        run: |
          # تأكد أن ملف pubspec.yaml يحتوي على sdk: '>=3.5.0' في جهازك
          flutter pub get

      - name: Build APK
        run: |
          # بناء التطبيق النهائي مع تجاهل تحذيرات الأيقونات
          flutter build apk --release --no-tree-shake-icons
