name: Full Android Auto Build
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Rebuild pubspec.yaml
        run: |
          cat <<EOF > pubspec.yaml
          name: seachat
          description: A new Flutter project.
          version: 1.0.0+1
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            cupertino_icons: ^1.0.6
            supabase_flutter: ^2.0.0
            image_picker: ^1.1.2
            uuid: ^4.4.0
            app_links: ^6.0.0
            provider: ^6.1.2
            shared_preferences: ^2.2.3
          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_launcher_icons: ^0.13.1
          flutter:
            uses-material-design: true
          EOF

      - name: Create Android Folder
        run: flutter create . --platforms android || true

      - name: Force SDK 36 Patch
        run: |
          # هذا السطر هو مفتاح الحل: يجبر المشروع والمكتبات على SDK 36
          echo "subprojects {
              afterEvaluate { project ->
                  if (project.hasProperty('android')) {
                      project.android {
                          if (namespace == null) { namespace 'com.judeadaiy.seachat' }
                          compileSdkVersion 36
                          buildToolsVersion '36.0.0-rc1'
                          defaultConfig {
                              minSdkVersion 23
                              targetSdkVersion 36
                          }
                      }
                  }
              }
          }" >> android/build.gradle

      - name: Install Dependencies
        run: flutter pub get || true

      - name: Build APK (Hard Mode)
        run: |
          # التنظيف ضروري قبل البناء بـ SDK جديد
          flutter clean || true
          flutter build apk --release --suppress-analytics --android-skip-build-dependency-validation || true

      - name: Final Search and Deliver
        run: |
          mkdir -p build/out
          # البحث في كل مكان ممكن حتى لو المسار غير قياسي
          find . -name "*.apk" -exec cp {} build/out/seachat-app.apk \; || true
          
          if [ -f build/out/seachat-app.apk ]; then
            echo "SUCCESS: APK is Ready!"
          else
            echo "CRITICAL: APK still not found."
            exit 1
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Package
          path: build/out/seachat-app.apk
