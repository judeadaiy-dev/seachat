name: SeaChat Ultimate Force Build V4

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          cache: true

      - name: Hard Reset & Clean Construction
        run: |
          # 1. تنظيف شامل للبيئة
          rm -rf android/
          flutter create --platforms=android .
          
          # 2. إنشاء ملف local.properties يدوي بمسارات صحيحة
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties
          
          # 3. تعديل settings.gradle لتعريف مسار الفلاتر (حل جذري لمشاكل المكاتب)
          # نستخدم ملف الإعدادات لفرض نسخة الـ SDK على كل المشروع
          cat > android/app/build.gradle << 'EOF'
          def localProperties = new Properties()
          def localPropertiesFile = rootProject.file('local.properties')
          if (localPropertiesFile.exists()) {
              localPropertiesFile.withReader('UTF-8') { reader ->
                  localProperties.load(reader)
              }
          }

          def flutterRoot = localProperties.getProperty('flutter.sdk')
          if (flutterRoot == null) {
              throw new GradleException("Flutter SDK not found. Define flutter.sdk in local.properties.")
          }

          apply plugin: 'com.android.application'
          apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"

          android {
              compileSdkVersion 34
              namespace "com.judea.sea_chat"
              
              defaultConfig {
                  applicationId "com.judea.sea_chat"
                  minSdkVersion 24
                  targetSdkVersion 34
                  versionCode 1
                  versionName "1.0.0"
              }
              
              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                  }
              }
          }

          dependencies {
              implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22"
          }
          EOF

      - name: Build APK
        run: |
          flutter pub get
          # بناء مباشر بدون إجراء فحوصات إضافية قد تسبب توقف
          flutter build apk --debug --target-platform android-arm,android-arm64,android-x64

      - name: Size Check & Verification
        run: |
          APK_PATH="build/app/outputs/flutter-apk/app-debug.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "FAILED: APK NOT GENERATED"
            exit 1
          fi
          SIZE=$(stat -c%s "$APK_PATH")
          echo "Success! APK Size: $SIZE bytes"
          if [ $SIZE -lt 5000000 ]; then
            echo "ERROR: FAKE APK GENERATED"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Final-V4
          path: build/app/outputs/flutter-apk/app-debug.apk
