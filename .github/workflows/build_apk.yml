name: Flutter Auto-Android Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0' 

      - name: Recreate Android Folder
        run: |
          rm -rf android
          flutter create . --platforms android --org com.seachat.app
          flutter pub get

      - name: Fix app_links & SDK Binding
        run: |
          # 1. إنشاء ملف الخصائص وربط المسارات الأساسية
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
          
          # 2. حقن تعريف Flutter في ملف build.gradle الرئيسي ليتعرف عليه app_links
          # سنضيف كود برمجياً يخبر Gradle بمكان وجود Flutter لجميع المشاريع الفرعية
          sed -i "1i def flutterRoot = '$FLUTTER_ROOT'" android/build.gradle
          
          # 3. تحديث إصدار الـ SDK إلى 35 المطلوب للمكتبات الحديثة في SeaChat
          sed -i 's/compileSdkVersion .*/compileSdkVersion 35/' android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 35/' android/app/build.gradle

      - name: Build APK
        run: |
          flutter pub upgrade
          flutter build apk --release --no-tree-shake-icons
