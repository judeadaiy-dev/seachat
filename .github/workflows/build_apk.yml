name: SeaChat Force Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Hard Cleanup & Path Injection
        run: |
          # 1. تنظيف شامل وإزالة ملفات القفل التي قد تحتوي على app_links
          flutter clean
          rm -f pubspec.lock
          
          # 2. حقن مسار Flutter و SDK مباشرة لحل مشكلة 'unknown property flutter'
          mkdir -p android
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
          
          # 3. تعديل ملفات build.gradle برمجياً لكل المكتبات في الـ cache 
          # لإجبارها على استخدام SDK 35 بدلاً من طلب 36
          find /home/runner/.pub-cache -name "build.gradle" -exec sed -i 's/compileSdkVersion .*/compileSdkVersion 35/g' {} +
          find /home/runner/.pub-cache -name "build.gradle" -exec sed -i 's/targetSdkVersion .*/targetSdkVersion 35/g' {} +
          
          # 4. إصلاح ملف الأندرويد الرئيسي لمشروع SeaChat
          sed -i "1i def flutterRoot = '$FLUTTER_ROOT'" android/build.gradle || true

      - name: Build APK
        run: |
          flutter pub get
          # بناء التطبيق وتجاهل الأيقونات المفقودة
          flutter build apk --release --no-tree-shake-icons
