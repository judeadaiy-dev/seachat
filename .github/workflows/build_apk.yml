name: Auto-Build SeaChat APK

# هذا الجزء يضمن أن يبني السكربت نفسه تلقائياً عند كل "رفع" للكود
on:
  push:
    branches: [ main, master ] # سيبدأ العمل فوراً عند الرفع على هذه الفروع
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # يترك لك خيار التشغيل اليدوي أيضاً للطوارئ

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 2. Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Setup Flutter 3.24.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: 4. Auto-Prepare Environment
        run: |
          # تنظيف وبناء بيئة الأندرويد من الصفر لضمان عدم وجود أخطاء سابقة
          rm -rf android .dart_tool build
          flutter create --platforms=android --org com.seachat --project-name sea_chat .
          flutter pub get

      - name: 5. Forced SDK 35 & Permissions Injection
        run: |
          # إجبار السيرفر على استخدام SDK 35 ليتوافق مع مكاتب الروابط الحديثة
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties
          echo "flutter.compileSdkVersion=35" >> android/local.properties
          echo "flutter.targetSdkVersion=35" >> android/local.properties
          echo "flutter.minSdkVersion=21" >> android/local.properties

          # حقن تصاريح الإنترنت (مهم للـ Supabase والدردشة)
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />' $MANIFEST
          
          # تفعيل مرور البيانات لروابط الدردشة
          sed -i 's/<application/<application android:usesCleartextTraffic="true"/' $MANIFEST

      - name: 6. Automated Gradle Patch
        run: |
          # تعديل ملف البناء الداخلي ليتطابق مع SDK 35
          APP_GRADLE="android/app/build.gradle"
          sed -i 's/compileSdk .*/compileSdk 35/' $APP_GRADLE
          sed -i 's/targetSdk .*/targetSdk 35/' $APP_GRADLE

      - name: 7. THE BUILD COMMAND (The Missing Link)
        run: |
          # هذا هو الأمر الذي كان يفتقده السكربت ليبني من تلقاء نفسه
          flutter build apk --release --no-tree-shake-icons

      - name: 8. Deliver APK to User
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Auto-Build
          path: build/app/outputs/flutter-apk/app-release.apk
