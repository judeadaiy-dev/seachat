name: Unstoppable UI Preview Build
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Force Build Environment
        run: |
          # بناء ملف pubspec أساسي جداً لتجنب تعارض النسخ
          cat <<EOF > pubspec.yaml
          name: seachat
          description: UI Preview
          version: 1.0.0+1
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            cupertino_icons: ^1.0.6
            supabase_flutter: ^2.0.0
            image_picker: ^1.1.2
            uuid: ^4.4.0
            app_links: ^6.0.0
            provider: ^6.1.2
            shared_preferences: ^2.2.3
          dev_dependencies:
            flutter_test:
              sdk: flutter
          flutter:
            uses-material-design: true
          EOF

      - name: Initialize Android Forcefully
        run: |
          flutter create . --platforms android --force || true
          
      - name: The "Everything Pass" Patch
        run: |
          # هذا السكريبت سيجبر الأندرويد على قبول أي مكتبة مهما كان إصدارها
          echo "subprojects {
              project.configurations.all {
                  resolutionStrategy.eachDependency { details ->
                      if (details.requested.group == 'com.android.support') {
                          details.useVersion '28.0.0'
                      }
                  }
              }
              afterEvaluate { project ->
                  if (project.hasProperty('android')) {
                      project.android {
                          if (namespace == null) { namespace 'com.judeadaiy.seachat' }
                          compileSdkVersion 34
                          buildToolsVersion '34.0.0'
                          defaultConfig {
                              minSdkVersion 21
                              targetSdkVersion 34
                              multiDexEnabled true
                          }
                          // لتجاهل أخطاء التوافق أثناء البناء
                          lintOptions {
                              checkReleaseBuilds false
                              abortOnError false
                          }
                      }
                  }
              }
          }" >> android/build.gradle

      - name: Install and Build (No Stop)
        run: |
          flutter pub get || true
          # بناء APK مع تجاهل الأخطاء القاتلة
          flutter build apk --release --no-pub --suppress-analytics --android-skip-build-dependency-validation || true

      - name: Emergency Search and Extract
        if: always()
        run: |
          mkdir -p build/out
          # البحث بعمق في كل المجلدات عن أي ملف ينتهي بـ .apk
          find . -type f -name "*.apk" -exec cp {} build/out/seachat-app.apk \; || true
          
          # فحص إذا وجدنا الملف فعلاً
          if [ -f build/out/seachat-app.apk ]; then
            echo "SUCCESS: Found APK even with errors."
          else
            echo "STILL MISSING: Trying fallback path..."
            cp build/app/outputs/flutter-apk/app-release.apk build/out/seachat-app.apk || true
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Preview
          path: build/out/seachat-app.apk
          if-no-files-found: warn
