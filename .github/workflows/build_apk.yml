name: Ultimate Fix Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Clean and Recreate
        run: |
          flutter clean
          rm -rf android
          flutter create . --platforms android
          flutter pub get

      # الخطوة الحاسمة: رفع نسخة الـ SDK لتتوافق مع مكتبة app_links
      - name: Patch Android Build Files
        run: |
          sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 34/g' android/app/build.gradle
          sed -i 's/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 34/g' android/app/build.gradle
          # إضافة دعم لخاصية flutter في المكتبات التي تشتكي
          echo "flutter.sdk=$(which flutter)" > android/local.properties

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
