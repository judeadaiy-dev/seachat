name: SeaChat Fresh Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Reconstruct Project & Install Dependencies
        run: |
          # 1. احذف android القديم
          rm -rf android
          
          # 2. انشئ android من جديد أول
          flutter create . --platforms android
          
          # 3. بعدين نزل الـ packages
          flutter pub get
          
          # 4. أضف صلاحية الإنترنت
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET"/>' android/app/src/main/AndroidManifest.xml
          
          # 5. صلاحيات gradlew
          chmod +x android/gradlew

      - name: Generate App Icons
        run: |
          # يتأكد أن عندك أيقونة في assets/icon.png
          # وينشئ كل الأحجام تلقائياً
          flutter pub run flutter_launcher_icons

      - name: Fix const errors with AppColors
        run: |
          echo "Fixing const TextStyle, Text, Icon with AppColors..."
          find lib -type f -name "*.dart" -exec sed -i 's/const TextStyle(/TextStyle(/g' {} +
          find lib -type f -name "*.dart" -exec sed -i 's/const Text(/Text(/g' {} +
          find lib -type f -name "*.dart" -exec sed -i 's/const Icon(/Icon(/g' {} +
          echo "Done fixing const errors"
          
      - name: Build Debug APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Fresh-Debug-APK
          path: build/app/outputs/flutter-apk/app-debug.apk
