name: Build SeaChat APK - Ultimate Beast V3 (The Fix)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 2. Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Setup Flutter 3.24.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: 4. Nuke and Rebuild Android
        run: |
          rm -rf android .dart_tool build
          flutter create --platforms=android --org com.seachat --project-name sea_chat .
          flutter pub get

      - name: 5. CRITICAL FIX - Global Gradle Injection
        run: |
          # 1. إعداد local.properties بمسارات واضحة للسيرفر
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties
          echo "flutter.compileSdkVersion=35" >> android/local.properties
          echo "flutter.targetSdkVersion=35" >> android/local.properties
          echo "flutter.minSdkVersion=21" >> android/local.properties

          # 2. حقن القيم في settings.gradle لتراها كل المكتبات الخارجية (مثل app_links)
          # هذا الجزء يحل مشكلة "unknown property flutter" و "compileSdkVersion not specified"
          cat > android/settings.gradle << 'EOF'
          include ':app'

          def localProperties = new Properties()
          def localPropertiesFile = new File(settingsDir, "local.properties")
          if (localPropertiesFile.exists()) {
              localPropertiesFile.withReader('UTF-8') { reader -> localProperties.load(reader) }
          }

          // تحميل نسخة فلاتر لكل المشروع
          def flutterSdkPath = localProperties.getProperty('flutter.sdk')
          if (flutterSdkPath == null) throw new GradleException("flutter.sdk not set in local.properties")
          apply from: "$flutterSdkPath/packages/flutter_tools/gradle/app_plugin_loader.gradle"

          // إجبار الإصدارات على 35 لكل المكتبات
          gradle.beforeProject { project ->
              if (project.hasProperty('android')) {
                  project.android {
                      compileSdkVersion 35
                  }
              }
          }
          EOF

      - name: 6. Patch App Build Gradle
        run: |
          # تعديل ملف التطبيق الداخلي ليتوافق مع الحقن العالمي
          APP_GRADLE="android/app/build.gradle"
          sed -i 's/compileSdk .*/compileSdk 35/' $APP_GRADLE
          sed -i 's/targetSdk .*/targetSdk 35/' $APP_GRADLE

      - name: 7. Permissions & Cleartext
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.RECORD_AUDIO" />' $MANIFEST
          sed -i 's/<application/<application android:usesCleartextTraffic="true"/' $MANIFEST

      - name: 8. Build Release APK
        run: |
          flutter build apk --release --no-tree-shake-icons

      - name: 9. Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Final-Build
          path: build/app/outputs/flutter-apk/app-release.apk
