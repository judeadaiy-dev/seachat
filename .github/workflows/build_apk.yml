name: SeaChat Ultimate Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Nuclear Cleanup & Reconstruct
        run: |
          # 1. حذف شامل للملفات المؤقتة والاعتمادات المحبوسة
          flutter clean
          rm -rf pubspec.lock
          rm -rf .dart_tool
          
          # 2. التأكد برمجياً من خلو ملف pubspec من app_links
          sed -i '/app_links:/d' pubspec.yaml
          
          # 3. إعادة بناء مجلد أندرويد من الصفر لضمان الهوية الجديدة
          rm -rf android
          flutter create . --platforms android --org com.seachat.app
          
          # 4. إصلاح مشاكل الربط في المكتبات الأخرى (مثل record_android)
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
          
          # 5. حقن تعريف Flutter في ملف build.gradle الرئيسي لتعرفه المكتبات الفرعية
          sed -i "1i def flutterRoot = '$FLUTTER_ROOT'" android/build.gradle
          
          # 6. تحديث إصدارات الـ SDK إلى 35 المطلوبة لمكتباتك الحديثة
          sed -i 's/compileSdkVersion .*/compileSdkVersion 35/' android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 35/' android/app/build.gradle

      - name: Final Build
        run: |
          flutter pub get
          # بناء الـ APK وتجاوز مشاكل الأيقونات غير الموجودة
          flutter build apk --release --no-tree-shake-icons
