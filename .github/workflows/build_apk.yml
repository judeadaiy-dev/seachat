name: Build Sea Chat APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. سحب الكود
        uses: actions/checkout@v4

      - name: 2. تثبيت Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. تثبيت Flutter 3.24
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: 4. تجديد Android + حل مشكلة app_links
        run: |
          rm -rf android
          flutter create --platforms=android --org com.seachat .
          
          # حل مشكلة compileSdk للمكتبات - الطريقة الصحيحة
          echo "flutter.compileSdkVersion=34" >> android/local.properties
          echo "flutter.targetSdkVersion=34" >> android/local.properties
          echo "flutter.minSdkVersion=21" >> android/local.properties
          
          # تفعيل multiDex
          sed -i '/defaultConfig {/a \        multiDexEnabled true' android/app/build.gradle
          
          # حل مشكلة app_links نهائياً
          cat >> android/settings.gradle << 'EOF'
          subprojects {
              afterEvaluate { project ->
                  if (project.hasProperty("android")) {
                      android {
                          compileSdkVersion 34
                          namespace = "dev.flutter.plugins." + project.name
                      }
                  }
              }
          }
          EOF

      - name: 5. تثبيت الحزم
        run: flutter pub get

      - name: 6. اضافة التصاريح
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/<\/manifest>/d' $MANIFEST
          cat >> $MANIFEST << 'PERMS'
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.CAMERA"/>
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32"/>
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>
              <uses-permission android:name="android.permission.READ_MEDIA_VIDEO"/>
              <uses-permission android:name="android.permission.RECORD_AUDIO"/>
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="29"/>
              <uses-permission android:name="android.permission.WAKE_LOCK"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK"/>
          </manifest>
          PERMS
          sed -i 's/<application/<application android:usesCleartextTraffic="true"/' $MANIFEST

      - name: 7. بناء APK نهائي
        run: flutter build apk --release --no-tree-shake-icons

      - name: 8. رفع الـ APK
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
