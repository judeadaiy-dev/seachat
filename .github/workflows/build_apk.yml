name: Ultimate Unified Build
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 1. تنظيف شامل وإنشاء بيئة الأندرويد من الصفر
      - name: Clean and Create Android
        run: |
          [span_2](start_span)flutter clean[span_2](end_span)
          [span_3](start_span)rm -rf android[span_3](end_span)
          flutter create . -[span_4](start_span)-platforms android[span_4](end_span)

      # 2. حقن إعدادات SDK 35 والـ Namespace برمجياً
      - name: Master Patch for SDK 35
        run: |
          echo "subprojects {
              afterEvaluate { project ->
                  if (project.hasProperty('android')) {
                      project.android {
                          [span_5](start_span)if (namespace == null) { namespace 'com.judeadaiy.seachat' }[span_5](end_span)
                          [span_6](start_span)compileSdkVersion 35[span_6](end_span)
                          defaultConfig {
                              [span_7](start_span)minSdkVersion 23[span_7](end_span)
                              [span_8](start_span)targetSdkVersion 35[span_8](end_span)
                              multiDexEnabled true
                          }
                      }
                  }
              }
          [span_9](start_span)}" >> android/build.gradle[span_9](end_span)

      # 3. تثبيت المكتبات وبناء الـ APK النهائي
      - name: Final Build APK
        run: |
          [span_10](start_span)flutter pub get[span_10](end_span)
          [span_11](start_span)flutter build apk --release --suppress-analytics --android-skip-build-dependency-validation[span_11](end_span)

      # 4. التحقق والبحث عن الملف لضمان الرفع
      - name: Verify and Prepare Artifact
        if: always()
        run: |
          mkdir -p build/out
          if [ -f build/app/outputs/flutter-apk/app-release.apk ]; then
            [span_12](start_span)cp build/app/outputs/flutter-apk/app-release.apk build/out/seachat-app.apk[span_12](end_span)
            echo "✅ APK Found in standard path."
          else
            echo "⚠️ APK not in standard path, searching everywhere..."
            find build -name "*.apk" -exec cp {} build/out/seachat-app.apk \; [span_13](start_span)|| true[span_13](end_span)
          fi

      # 5. الرفع النهائي (سيظهر باللون الأحمر إذا لم يجد الملف)
      - name: Upload Verified APK
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Final-Build
          [span_14](start_span)path: build/out/seachat-app.apk[span_14](end_span)
          [span_15](start_span)if-no-files-found: error[span_15](end_span)
