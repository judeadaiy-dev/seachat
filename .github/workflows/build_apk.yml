name: Build Sea Chat APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. سحب الكود
        uses: actions/checkout@v4

      - name: 2. تثبيت Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. تثبيت Flutter 3.24
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: 4. انشاء مشروع Android جديد + نسخ ملفاتك
        run: |
          # نحفظ ملفاتك مؤقت
          mkdir -p ~/backup_lib
          cp lib/main.dart ~/backup_lib/ || true
          cp lib/widgets.dart ~/backup_lib/ || true
          cp lib/admin.dart ~/backup_lib/ || true
          cp pubspec.yaml ~/backup_lib/ || true
          
          # ننشئ مشروع نظيف
          flutter create --platforms=android --org com.seachat --project-name sea_chat temp_project
          
          # نرجع ملفاتك
          rm -rf android lib pubspec.yaml
          mv temp_project/android ./
          mkdir lib
          cp ~/backup_lib/main.dart lib/
          cp ~/backup_lib/widgets.dart lib/
          cp ~/backup_lib/admin.dart lib/
          cp ~/backup_lib/pubspec.yaml ./
          rm -rf temp_project ~/backup_lib

      - name: 5. تثبيت الحزم
        run: flutter pub get

      - name: 6. اضافة التصاريح
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/<\/manifest>/d' $MANIFEST
          cat >> $MANIFEST << 'PERMS'
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.CAMERA"/>
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32"/>
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>
              <uses-permission android:name="android.permission.READ_MEDIA_VIDEO"/>
              <uses-permission android:name="android.permission.RECORD_AUDIO"/>
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="29"/>
              <uses-permission android:name="android.permission.WAKE_LOCK"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK"/>
          </manifest>
          PERMS
          sed -i 's/<application/<application android:usesCleartextTraffic="true"/' $MANIFEST
          sed -i '/defaultConfig {/a \        multiDexEnabled true' android/app/build.gradle

      - name: 7. بناء APK نهائي
        run: flutter build apk --release --no-tree-shake-icons

      - name: 8. رفع الـ APK
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
