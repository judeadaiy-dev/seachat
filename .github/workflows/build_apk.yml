name: SeaChat Build - Tank V4 (Direct Android Build)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20 # تقليل الوقت لسرعة التنفيذ
    
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Setup Flutter 3.24.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: 4. Clean and Create Fresh Project
        run: |
          # حذف أي مجلدات منصات قديمة لضمان نظافة البيئة
          rm -rf android ios linux macos windows web
          # إنشاء مجلد أندرويد فقط من جديد
          flutter create --platforms android --org com.seachat --project-name sea_chat .

      - name: 5. Install Dependencies
        run: |
          flutter pub get
          # تحديث المكتبات لتجنب تعارض record_linux الذي ظهر سابقاً
          flutter pub upgrade record_platform_interface

      - name: 6. Configure Android SDK and Permissions
        run: |
          # ضبط ملف build.gradle الرئيسي
          cat > android/build.gradle << 'EOF'
          buildscript {
              ext.kotlin_version = '1.9.0'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.0'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.buildDir = '../build'
          subprojects {
              project.buildDir = "${rootProject.buildDir}/${project.name}"
          }
          subprojects {
              project.evaluationDependsOn(':app')
          }
          tasks.register("clean", Delete) {
              delete rootProject.buildDir
          }
          EOF

          # ضبط ملف app/build.gradle ليدعم SDK 35 مباشرة
          APP_GRADLE="android/app/build.gradle"
          sed -i 's/compileSdk = .*/compileSdk = 35/' $APP_GRADLE
          sed -i 's/targetSdk = .*/targetSdk = 35/' $APP_GRADLE
          sed -i 's/minSdk = .*/minSdk = 21/' $APP_GRADLE

          # إضافة تصاريح الإنترنت والكاميرا والصوت في الـ Manifest
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />' $MANIFEST

      - name: 7. Build Debug APK
        run: |
          # استخدام --no-pub لأننا قمنا بـ get بالفعل، و --debug للسرعة
          flutter build apk --debug --no-pub

      - name: 8. Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Fresh-Debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

