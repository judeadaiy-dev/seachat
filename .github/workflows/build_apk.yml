name: Flutter Auto-Android Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # نستخدم أحدث إصدار مستقر ليقوم بإنشاء ملفات أندرويد حديثة تلقائياً
          flutter-version: '3.24.0' 

      - name: Clean and Reconstruct
        run: |
          # حذف المجلد القديم لضمان عدم وجود ملفات معطوبة
          rm -rf android
          # إجبار فلاتر على إنشاء مجلد أندرويد جديد بأحدث الإعدادات
          flutter create . --platforms android --org com.seachat.app
          # تحديث المكتبات لضمان توافق الروابط (مثل Supabase و App Links)
          flutter pub get

      - name: Build APK
        run: |
          # سنمرر إعدادات الـ SDK مباشرة للأمر دون لمس الملفات
          flutter build apk --release --no-tree-shake-icons
