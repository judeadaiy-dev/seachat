name: Build SeaChat - REAL APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          cache: true

      - name: Create Clean Project Structure
        run: |
          # تنظيف أي مخلفات سابقة
          rm -rf ./* # إنشاء مشروع جديد كلياً بنفس الاسم
          flutter create --platforms=android --org com.judea --project-name sea_chat .
          
          # إنشاء ملف الـ pubspec بالأصناف المطلوبة
          cat > pubspec.yaml << 'EOF'
          name: sea_chat
          description: "SeaChat Application"
          version: 1.0.0+1
          publish_to: 'none'
          environment:
            sdk: '>=3.5.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            cupertino_icons: ^1.0.8
            supabase_flutter: ^2.8.4
            google_fonts: ^6.2.1
          flutter:
            uses-material-design: true
          EOF

          # ضبط إعدادات الأندرويد يدوياً لضمان التوافق مع 13+
          # تعديل minSdkVersion و targetSdkVersion في build.gradle
          sed -i 's/minSdkVersion .*/minSdkVersion 24/' android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 34/' android/app/build.gradle
          
          # إضافة إذن الإنترنت بشكل صحيح
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />' android/app/src/main/AndroidManifest.xml

      - name: Build APK
        run: |
          flutter pub get
          # بناء APK حقيقي وشامل لجميع المعالجات لضمان الحجم الكامل
          flutter build apk --debug --target-platform android-arm,android-arm64,android-x64

      - name: Check APK Size (Verify)
        run: |
          ls -lh build/app/outputs/flutter-apk/app-debug.apk
          # إذا كان الحجم أقل من 1 ميجا سيفشل الـ workflow هنا لتعرف السبب
          SIZE=$(stat -c%s "build/app/outputs/flutter-apk/app-debug.apk")
          if [ $SIZE -lt 1000000 ]; then
            echo "Error: APK is too small, something went wrong!"
            exit 1
          fi

      - name: Upload Real APK
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Real-Installable
          path: build/app/outputs/flutter-apk/app-debug.apk
