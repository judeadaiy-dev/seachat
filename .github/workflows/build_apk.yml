name: SeaChat Fresh Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Reconstruct Project & Install Dependencies
        run: |
          rm -rf android
          flutter create --platforms android --org com.seachat --project-name sea_chat .
          flutter pub get
          
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET"/>' android/app/src/main/AndroidManifest.xml
          chmod +x android/gradlew

      - name: Fix Gradle for app_links - مهم جداً
        run: |
          # هذا يحل مشكلة app_links نهائياً
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/' android/app/build.gradle
          sed -i 's/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 35/' android/app/build.gradle
          sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 35/' android/app/build.gradle
          
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties
          
          # هذا السطر يحل مشكلة كل المكتبات ومنها app_links
          echo 'subprojects { afterEvaluate { project -> if (project.hasProperty("android")) { project.android.compileSdkVersion 35 } } }' >> android/build.gradle

      - name: Generate App Icons
        run: |
          flutter pub run flutter_launcher_icons
          
      - name: Build Debug APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Fresh-Debug-APK
          path: build/app/outputs/flutter-apk/app-debug.apk
