name: Mobile Test Build

on:
  push:
    branches: [ "main", "master" ] # سيعمل الكود عند الدفع لهذه الفروع
  workflow_dispatch: # يتيح لك تشغيل البناء يدوياً من موقع غيت هب

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17' # إصدار حديث ومستقر
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Recreate Android Project
        # هذا الأمر هو المفتاح: ينشئ ملفات أندرويد متوافقة مع الإصدار الحالي
        run: |
          rm -rf android
          flutter create . --platforms android

      - name: Get Dependencies
        run: flutter pub get

      - name: Build Debug APK
        # بناء نسخة Debug أسرع وتعمل مباشرة على الهواتف للتجربة
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mobile-Test-App
          path: build/app/outputs/flutter-apk/app-debug.apk
