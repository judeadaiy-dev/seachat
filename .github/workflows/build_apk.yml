name: SeaChat Supabase & Permissions Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Reconstruct & Inject Permissions
        run: |
          # 1. إعادة إنشاء مجلد أندرويد
          rm -rf android
          flutter create . --platforms android --org com.seachat.app
          
          # 2. حقن تصاريح (الإنترنت، المايكروفون، التخزين) في AndroidManifest.xml
          # هذه الخطوة ضرورية لعمل Supabase ومكتبات الصوت
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.RECORD_AUDIO" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />' $MANIFEST

          # 3. إعداد ملفات Gradle لحل مشكلة مكتبة record_android
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
          sed -i "1i def flutterRoot = '$FLUTTER_ROOT'" android/build.gradle
          
          # 4. رفع إصدار الـ SDK إلى 35 لضمان عمل Supabase Authentication
          sed -i 's/compileSdkVersion .*/compileSdkVersion 35/' android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 35/' android/app/build.gradle

      - name: Build APK
        run: |
          flutter pub get
          # بناء التطبيق مع ربط مكاتب Supabase وتجاهل أيقونات Launcher المؤقتة
          flutter build apk --release --no-tree-shake-icons
