name: SeaChat Full Build + DB Check

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Reconstruct Android Project - Modern Config
        run: |
          rm -rf android
          flutter create . --platforms android --org com.seachat
          flutter pub add flutter_launcher_icons image_picker supabase_flutter
          flutter pub get

      - name: Fix Android Manifest + Permissions
        run: |
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET"/>' android/app/src/main/AndroidManifest.xml
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.CAMERA"/>' android/app/src/main/AndroidManifest.xml
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>' android/app/src/main/AndroidManifest.xml
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.RECORD_AUDIO"/>' android/app/src/main/AndroidManifest.xml

      - name: Update Gradle + Kotlin - Latest
        run: |
          sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "2.1.0"/' android/build.gradle
          sed -i 's/com.android.tools.build:gradle:.*/com.android.tools.build:gradle:8.7.0/' android/build.gradle
          sed -i 's/compileSdkVersion .*/compileSdkVersion 35/' android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 35/' android/app/build.gradle
          sed -i 's/minSdkVersion .*/minSdkVersion 21/' android/app/build.gradle

      - name: Create Modern App Icons - No Blue Frame
        run: |
          mkdir -p assets
          # نصنع ايقونة SVG حديثة بدون اطار ازرق
          cat > assets/app_icon.svg << 'EOF'
          <svg width="512" height="512" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#1E293B;stop-opacity:1" />
              </linearGradient>
            </defs>
            <rect width="512" height="512" rx="120" fill="url(#grad)"/>
            <circle cx="256" cy="256" r="140" fill="#E9F056" opacity="0.9"/>
            <path d="M256 150 L350 256 L256 362 L162 256 Z" fill="#0F172A"/>
            <circle cx="256" cy="256" r="30" fill="#E9F056"/>
          </svg>
          EOF
          
          # نحول SVG الى PNG بكل الاحجام
          sudo apt-get update && sudo apt-get install -y imagemagick
          convert -background none assets/app_icon.svg -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          convert -background none assets/app_icon.svg -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert -background none assets/app_icon.svg -resize 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert -background none assets/app_icon.svg -resize 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert -background none assets/app_icon.svg -resize 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher.png

      - name: Fix All Dart Errors
        run: |
          # 1. صلح اللون الناقص
          sed -i 's/0xFFAEBBA/0xFFAEBBA0/g' lib/main.dart
          # 2. شيل كل const
          find lib -type f -name "*.dart" -exec sed -i 's/const //g' {} +
          # 3. صلح imports
          find lib/data -type f -name "*.dart" -exec sed -i 's|import "models.dart"|import "../models.dart"|g' {} +
          # 4. ضيف dart:io للصور
          sed -i '1i import "dart:io";' lib/profile_settings.dart

      - name: Print DB Tables Used - للمطابقة
        run: |
          echo "=========================================="
          echo "جداول Supabase المستخدمة في الكود:"
          echo "=========================================="
          grep -r "from('" lib/ | grep -o "from('[^']*" | sort | uniq | sed 's/from(//' | sed 's/^/  - /'
          echo ""
          echo "=========================================="
          echo "جداول الارسال تحديداً:"
          echo "=========================================="
          grep -r "insert\|update" lib/ | grep "from(" | sed 's/.*from(/  - /' | sed 's/).*//' | sort | uniq
          echo "=========================================="

      - name: Build Release APK
        run: flutter build apk --release

      - name: Build App Bundle AAB
        run: flutter build appbundle --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Release-APK
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Release-AAB
          path: build/app/outputs/bundle/release/app-release.aab
