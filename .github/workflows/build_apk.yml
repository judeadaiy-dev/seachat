name: SeaChat Fresh Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Reconstruct Project Environment
        run: |
          # 1. تنظيف أي مخلفات قديمة
          rm -rf android
          
          # 2. تحميل الحزم أولاً لضمان وجودها
          flutter pub get
          
          # 3. إنشاء مجلد أندرويد جديد متوافق مع نسخة فلاتر الحالية
          flutter create . --platforms android
          
          # 4. إضافة الصلاحيات الضرورية للمانيفست الجديد
          # سنستخدم 'sed' لإضافة صلاحية الإنترنت مباشرة بعد وسام المانيفست
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET"/>' android/app/src/main/AndroidManifest.xml
          
          # 5. إعطاء صلاحية التنفيذ لـ Gradle
          chmod +x android/gradlew

      - name: Build Debug APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: SeaChat-Fresh-Debug-APK
          path: build/app/outputs/flutter-apk/app-debug.apk
