name: SeaChat Clean Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Force Clean and Reconstruction
        run: |
          # 1. حذف شامل لملفات القفل والكاش لضمان عدم استدعاء app_links نهائياً
          flutter clean
          rm -f pubspec.lock
          rm -rf .dart_tool
          
          # 2. إعادة إنشاء مجلد أندرويد ليكون متوافقاً مع الهوية الجديدة com.seachat.app
          rm -rf android
          flutter create . --platforms android --org com.seachat.app
          
          # 3. إعداد ملف local.properties لربط مسارات Flutter و Android
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
          
          # 4. حقن تعريف Flutter في ملف build.gradle الرئيسي لحل مشكلة 'unknown property flutter'
          sed -i "1i def flutterRoot = '$FLUTTER_ROOT'" android/build.gradle
          
          # 5. تحديث إصدارات الـ SDK إلى 35 المطلوبة لمكتبات الصوت والصور
          sed -i 's/compileSdkVersion .*/compileSdkVersion 35/' android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 35/' android/app/build.gradle

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
