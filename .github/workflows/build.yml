name: SeaChat CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-supabase:
    name: Test Supabase Connection
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Test Supabase Connection - CI Only
        run: |
          cat > test_login.dart << 'EOF'
          import 'dart:io';
          import 'package:supabase/supabase.dart';
          
          Future<void> main() async {
            print('Starting Supabase test');
            
            const url = 'https://jmsmrojtlstppnpwmkkk.supabase.co';
            const anonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imptc21yb2p0bHN0cHBucHdta2trIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MTg2NDAsImV4cCI6MjA4ODM5NDY0MH0.j7gxr5CvrfvbJJzK_pMwVHiCE2AqpXUTThpeLEBmsos';
            
            try {
              print('Connecting to Supabase');
              
              if (url.endsWith('/')) {
                print('Error: URL ends with slash');
                exit(1);
              }
              
              final supabase = SupabaseClient(url, anonKey);
              print('Client created successfully');
              
              final res = await supabase.auth.signInWithPassword(
                email: 'barqaday@gmail.com',
                password: 'tyfgcv65',
              );
              
              if (res.user != null) {
                print('Login success');
                print('User ID: ${res.user!.id}');
                print('Email: ${res.user!.email}');
                await supabase.auth.signOut();
                print('Logout success');
              } else {
                print('Login failed: user null');
                exit(1);
              }
              
            } on AuthException catch (e) {
              print('Auth error: ${e.message}');
              exit(1);
            } catch (e) {
              print('General error: $e');
              exit(1);
            }
            
            print('All tests passed');
          }
          EOF
          
          dart pub add supabase
          dart test_login.dart

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: test-supabase
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sea-chat-apk
          path: build/app/outputs/flutter-apk/app-release.apk
