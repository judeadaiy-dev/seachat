name: Build Flutter APK Release

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Regenerate Android folder
        run: |
          rm -rf android
          flutter create --platforms=android --org com.judea --project-name sea_chat .

      - name: Create missing app_config.dart
        run: |
          mkdir -p lib/config
          cat > lib/config/app_config.dart << 'EOF'
          class AppConfig {
            static const String appName = 'SeaChat';
            static const String supabaseUrl = 'https://jmsmrojtlstppnpwmkkk.supabase.co';
            static const String supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imptc21yb2p0bHN0cHBucHdta2trIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MTg2NDAsImV4cCI6MjA4ODM5NDY0MH0.j7gxr5CvrfvbJJzK_pMwVHiCE2AqpXUTThpeLEBmsos';
            static const String copyrightYear = '2024';
            static const String copyrightName = 'JudeaDay';
          }
          EOF

      - name: Get dependencies
        run: flutter pub get

      - name: Add flutter_launcher_icons package
        run: flutter pub add dev:flutter_launcher_icons

      - name: Create icons config with your path
        run: |
          cat > flutter_launcher_icons.yaml << 'EOF'
          flutter_launcher_icons:
            android: true
            ios: false
            image_path: "assets/icon.png"
            min_sdk_android: 21
            adaptive_icon_background: "#482855"
            adaptive_icon_foreground: "assets/icon.png"
          EOF

      - name: Generate app icons
        run: dart run flutter_launcher_icons
        continue-on-error: true

      - name: Generate splash screen
        run: dart run flutter_native_splash:create
        continue-on-error: true

      - name: Build APK Release
        run: flutter build apk --release --split-per-abi

      - name: Upload APK - arm64
        uses: actions/upload-artifact@v4
        with:
          name: app-release-arm64-v8a
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk

      - name: Upload APK - Universal
        uses: actions/upload-artifact@v4
        with:
          name: app-release-universal
          path: build/app/outputs/flutter-apk/app-release.apk
