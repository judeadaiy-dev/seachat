Name: Build Flutter APK Release

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Regenerate Android folder
        run: |
          rm -rf android
          # إنشاء مشروع جديد لضمان نظافة الملفات وتوافقها مع نسخة فلاتر
          flutter create --platforms=android --org com.judea --project-name sea_chat .

      - name: Inject Internet Permissions & Network Security
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          
          # 1. إضافة صلاحيات الإنترنت والوصول للشبكة قبل وسم <application>
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />' $MANIFEST
          
          # 2. السماح بمرور بيانات HTTP وتعديل سمات الـ Application
          # هذا السطر يضمن أن أندرويد لا يحجب الاتصال بروابط Supabase
          sed -i 's/<application/<application android:usesCleartextTraffic="true"/' $MANIFEST
          
          # 3. التأكد من أن الـ Activity الأساسية مسموح لها بالظهور (exported)
          sed -i 's/android:name="io.flutter.embedding.android.FlutterActivity"/android:name="io.flutter.embedding.android.FlutterActivity" android:exported="true"/' $MANIFEST

      - name: Create App Configuration
        run: |
          mkdir -p lib/config
          cat > lib/config/app_config.dart << 'EOF'
          class AppConfig {
            static const String appName = 'SeaChat';
            static const String supabaseUrl = 'https://jmsmrojtlstppnpwmkkk.supabase.co';
            static const String supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imptc21yb2p0bHN0cHBucHdta2trIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MTg2NDAsImV4cCI6MjA4ODM5NDY0MH0.j7gxr5CvrfvbJJzK_pMwVHiCE2AqpXUTThpeLEBmsos';
            static const String copyrightYear = '2024';
            static const String copyrightName = 'JudeaDay';
          }
          EOF

      - name: Get dependencies
        run: |
          flutter pub get
          # إضافة الحزم الضرورية التي قد يحتاجها التطبيق للعمل مع الأيقونات أو الواجهات
          flutter pub add dev:flutter_launcher_icons --dev
          flutter pub add dev:flutter_native_splash --dev

      - name: Generate App Assets (Icons & Splash)
        run: |
          # إعداد أيقونة التطبيق (تأكد من وجود assets/icon.png في مستودعك)
          cat > flutter_launcher_icons.yaml << 'EOF'
          flutter_launcher_icons:
            android: true
            ios: false
            image_path: "assets/icon.png"
            min_sdk_android: 21
            adaptive_icon_background: "#482855"
            adaptive_icon_foreground: "assets/icon.png"
          EOF
          dart run flutter_launcher_icons || true
          dart run flutter_native_splash:create || true

      - name: Build APK Release
        run: |
          # البناء لجميع المعالجات لضمان عمله على هاتفك
          flutter build apk --release

      - name: Upload APK - Universal
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Release-APK
          path: build/app/outputs/flutter-apk/app-release.apk
