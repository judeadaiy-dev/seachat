name: Build Flutter APK

on:
  push:
    branches:
      - main
      - master

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Project
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.22.2
          cache: true

      - name: Disable iOS
        run: flutter config --no-enable-ios

      - name: Flutter Doctor
        run: flutter doctor -v

      - name: Verify Flutter Project
        run: |
          test -f pubspec.yaml || exit 1
          test -d android || exit 1
          test -f android/settings.gradle || exit 1
          test -f android/app/build.gradle || exit 1

      - name: Clean Project
        run: flutter clean

      - name: Get Packages
        run: flutter pub get

      - name: Generate Launcher Icons
        run: dart run flutter_launcher_icons

      - name: Analyze Dart Issues
        run: flutter analyze || true

      - name: Build Release APK
        run: flutter build apk --release --verbose

      - name: Verify APK Exists
        run: |
          test -f build/app/outputs/flutter-apk/app-release.apk || exit 1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sea-chat-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
