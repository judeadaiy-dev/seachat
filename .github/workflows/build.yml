name: Build Flutter APK Release

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # تقدر تشغله يدوي

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0' # غيره لإصدارك
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate app icons
        run: |
          # هذا يولد كل الأيقونات تلقائي من صورة واحدة
          # لازم تكون ضايف flutter_launcher_icons في pubspec.yaml
          dart run flutter_launcher_icons
        continue-on-error: true # يكمل حتى لو ماعندك البكج

      - name: Generate splash screen
        run: |
          dart run flutter_native_splash:create
        continue-on-error: true # يكمل حتى لو ماعندك البكج

      - name: Build APK Release
        run: flutter build apk --release --split-per-abi

      - name: Upload APK - arm64
        uses: actions/upload-artifact@v4
        with:
          name: app-release-arm64-v8a
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk

      - name: Upload APK - Universal
        uses: actions/upload-artifact@v4
        with:
          name: app-release-universal
          path: build/app/outputs/flutter-apk/app-release.apk
