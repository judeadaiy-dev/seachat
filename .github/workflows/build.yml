name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-and-build:
    name: Test Auth + Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Test Supabase Email Login
        run: |
          mkdir supabase_test
          cd supabase_test
          cat > pubspec.yaml << 'EOF'
          name: supabase_test
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            supabase: ^2.0.0
          EOF
          cat > test.dart << 'EOF'
          import 'dart:io';
          import 'package:supabase/supabase.dart';
          Future<void> main() async {
            const url = 'https://jmsmrojtlstppnpwmkkk.supabase.co';
            const anonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imptc21yb2p0bHN0cHBucHdta2trIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MTg2NDAsImV4cCI6MjA4ODM5NDY0MH0.j7gxr5CvrfvbJJzK_pMwVHiCE2AqpXUTThpeLEBmsos';
            final supabase = SupabaseClient(url, anonKey);
            try {
              final res = await supabase.auth.signInWithPassword(
                email: 'barqaday@gmail.com',
                password: 'tyfgcv65',
              );
              if (res.user != null) {
                print('SUCCESS: Login works');
                exit(0);
              } else {
                print('FAILED: User null');
                exit(1);
              }
            } on AuthException catch (e) {
              print('AUTH ERROR: ${e.message}');
              exit(1);
            }
          }
          EOF
          dart pub get
          dart test.dart

      - name: Check if icon.png exists
        run: |
          if [ ! -f "assets/icon.png" ]; then
            echo "ERROR: assets/icon.png not found!"
            echo "Upload your 1024x1024 icon.png to assets/ folder first"
            exit 1
          fi
          echo "Icon found: assets/icon.png"

      - name: Install flutter_launcher_icons
        run: flutter pub add dev:flutter_launcher_icons

      - name: Generate App Icons from your PNG
        run: |
          cat > flutter_launcher_icons.yaml << 'EOF'
          flutter_launcher_icons:
            android: true
            ios: false
            image_path: "assets/icon.png"
            min_sdk_android: 21
            adaptive_icon_background: "#FFFFFF"
            adaptive_icon_foreground: "assets/icon.png"
          EOF
          
          flutter pub get
          dart run flutter_launcher_icons:main

      - name: Get dependencies
        run: flutter pub get

      - name: Build Release APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Android
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
