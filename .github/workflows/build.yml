name: Build Flutter APK Release

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Regenerate Android folder
        run: |
          rm -rf android
          flutter create --platforms=android --org com.judea --project-name sea_chat .

      - name: Get dependencies
        run: flutter pub get

      - name: Test Supabase Login - كشف سبب عدم الدخول
        run: |
          cat > test_login.dart << 'EOF'
          import 'package:supabase_flutter/supabase_flutter.dart';
          
          void main() async {
            print('=== بدء فحص Supabase ===');
            
            const url = 'https://jmsmrojtlstppnpwmkkk.supabase.co';
            const anonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imptc21yb2p0bHN0cHBucHdta2trIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MTg2NDAsImV4cCI6MjA4ODM5NDY0MH0.j7gxr5CvrfvbJJzK_pMwVHiCE2AqpXUTThpeLEBmsos';
            
            try {
              print('1. فحص الرابط: $url');
              if (url.endsWith('/')) {
                print('⚠️ تحذير: الرابط ينتهي بـ / وهذا يسبب مشكلة');
                exit(1);
              }
              
              print('2. فحص المفتاح: ${anonKey.substring(0, 20)}...');
              if (!anonKey.startsWith('eyJ')) {
                print('❌ خطأ: المفتاح مو anon key. لازم يبدأ بـ eyJ');
                exit(1);
              }
              
              print('3. جاري تهيئة Supabase...');
              await Supabase.initialize(url: url, anonKey: anonKey);
              print('✅ تم تهيئة Supabase بنجاح');
              
              print('4. تجربة تسجيل دخول barqaday@gmail.com...');
              final res = await Supabase.instance.client.auth.signInWithPassword(
                email: 'barqaday@gmail.com',
                password: 'tyfgcv65',
              );
              
              if (res.user != null) {
                print('✅ نجح تسجيل الدخول');
                print('   User ID: ${res.user!.id}');
                print('   Email: ${res.user!.email}');
                print('   الجلسة محفوظة: ${Supabase.instance.client.auth.currentSession != null}');
                await Supabase.instance.client.auth.signOut();
                print('✅ تم تسجيل الخروج بنجاح');
              } else {
                print('❌ فشل: رجع user = null');
                exit(1);
              }
              
            } on AuthException catch (e) {
              print('❌ خطأ Auth: ${e.message}');
              print('   Status Code: ${e.statusCode}');
              if (e.message.contains('Email not confirmed')) {
                print('   الحل: روح Supabase → Authentication → Providers → Email → طفي Confirm email');
              }
              if (e.message.contains('Invalid login credentials')) {
                print('   الحل: الايميل أو الباسورد غلط. تأكد من users بجدول auth.users');
              }
              exit(1);
            } catch (e) {
              print('❌ خطأ عام: $e');
              print('   نوع الخطأ: ${e.runtimeType}');
              if (e.toString().contains('Failed host lookup')) {
                print('   السبب: الرابط مكرر أو فيه غلط. تأكد من AppConfig');
              }
              if (e.toString().contains('SocketException')) {
                print('   السبب: مافي انترنت أو الرابط غلط');
              }
              exit(1);
            }
            
            print('=== كل الفحوصات نجحت ✅ ===');
          }
          EOF
          
          dart pub add supabase_flutter
          dart test_login.dart
        continue-on-error: false

      - name: Generate app icons
        run: dart run flutter_launcher_icons
        continue-on-error: true

      - name: Generate splash screen
        run: dart run flutter_native_splash:create
        continue-on-error: true

      - name: Build APK Release
        run: flutter build apk --release --split-per-abi

      - name: Upload APK - arm64
        uses: actions/upload-artifact@v4
        with:
          name: app-release-arm64-v8a
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk

      - name: Upload APK - Universal
        uses: actions/upload-artifact@v4
        with:
          name: app-release-universal
          path: build/app/outputs/flutter-apk/app-release.apk
