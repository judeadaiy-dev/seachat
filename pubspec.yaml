name: sea_chat
description: "A modern chat application with glassmorphism design powered by Supabase."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Icons
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.3.1

  # Backend
  supabase_flutter: ^2.10.6

  # Chat Features
  image_picker: ^1.1.2
  record: 5.1.2              # نزلنا من 6.0.0 عشان minSdk 21
  just_audio: ^0.9.42
  permission_handler: ^11.3.1
  app_links: 3.4.0           # ضفناها عشان ما يطلب compileSdk 35
  flutter_plugin_android_lifecycle: 2.0.17  # ضفناها عشان ما يطلب compileSdk 35

  # Utilities
  uuid: ^4.5.1
  path_provider: ^2.1.5
  timeago: ^3.7.0
  intl: ^0.19.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/icon/
  
  fonts:
    - family: Cairo
      fonts:
        - asset: fonts/Cairo-Regular.ttf
          weight: 400
        - asset: fonts/Cairo-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#00BCD4"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  min_sdk_android: 21
