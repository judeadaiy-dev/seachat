name: sea_chat
description: Sea Chat - تطبيق دردشة بحري بثيم مائي
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Supabase - قاعدة البيانات والمصادقة
  supabase_flutter: ^2.5.6
  
  # التنقل الداخلي - بديل app_links
  go_router: ^14.2.7
  
  # وسائط: صور + صوت
  image_picker: ^1.1.2
  record: ^5.1.2
  just_audio: ^0.9.36
  
  # ادوات
  intl: ^0.19.0
  cupertino_icons: ^1.0.8
  
  # ايقونة التطبيق
  flutter_launcher_icons: ^0.13.1

# هذا يحذف app_links نهائياً عشان ما يضرب البناء
dependency_overrides:
  app_links: 

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # الخط العربي
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700

  # الملفات
  assets:
    - assets/icon.png

# اعدادات ايقونة التطبيق
flutter_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  adaptive_icon_background: "#0A1929"
  adaptive_icon_foreground: "assets/icon.png"
