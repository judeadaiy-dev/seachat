name: sea_chat
description: "A modern glassmorphism chat application powered by Supabase."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Backend
  supabase_flutter: ^2.6.0

  # Utilities
  uuid: ^4.4.0
  image_picker: ^1.1.2

  # Fonts
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true

  # إذا لديك صور فعلية داخل assets فعل هذا لاحقاً
  # assets:
  #   - assets/images/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/icon/icon.png

flutter_native_splash:
  color: "#0F172A"
  image: assets/icon/splash.png
  android: true
