name: SeaChat Build

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Create Android Only
        run: |
          rm -rf android
          flutter create --platforms android --org com.seachat --project-name sea_chat .

      - name: Install Dependencies
        run: flutter pub get

      - name: Force SDK 35 for All Plugins
        run: |
          # صلاحيات
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET"/>' android/app/src/main/AndroidManifest.xml
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.CAMERA"/>' android/app/src/main/AndroidManifest.xml
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>' android/app/src/main/AndroidManifest.xml
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.RECORD_AUDIO"/>' android/app/src/main/AndroidManifest.xml
          chmod +x android/gradlew
          
          # اجبار SDK 35 بكل مكان
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/' android/app/build.gradle
          sed -i 's/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 35/' android/app/build.gradle
          sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 35/' android/app/build.gradle
          
          # هذا السطر يحل مشكلة app_links + record_android + lifecycle
          cat > android/app/build.gradle.tmp << 'EOF'
          android {
              namespace "com.seachat.sea_chat"
              compileSdk 35
              ndkVersion flutter.ndkVersion

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }

              defaultConfig {
                  applicationId "com.seachat.sea_chat"
                  minSdkVersion 21
                  targetSdkVersion 35
                  versionCode flutterVersionCode.toInteger()
                  versionName flutterVersionName
              }

              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                  }
              }
          }
          EOF
          
          # استبدل android block كامل
          sed -i '/^android {/,/^}/c\ ' android/app/build.gradle
          sed -i '/apply plugin: "com.android.application"/r android/app/build.gradle.tmp' android/app/build.gradle
          rm android/app/build.gradle.tmp
          
          # اجبار كل المكتبات على SDK 35
          cat >> android/build.gradle << 'EOF'

          subprojects {
              afterEvaluate { project ->
                  if (project.hasProperty("android")) {
                      android {
                          compileSdkVersion 35
                      }
                  }
              }
          }
          EOF
          
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          
      - name: Build Debug APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Debug-APK
          path: build/app/outputs/flutter-apk/app-debug.apk
