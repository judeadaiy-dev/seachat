name: seachat
description: SeaChat - Modern Arabic Chat App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
    uuid: ^4.4.0
  cupertino_icons: ^1.0.6
  supabase_flutter: ^2.5.0
  google_sign_in: ^6.2.1
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/

# إعدادات الأيقونة - أندرويد فقط
flutter_launcher_icons:
  android: true        # ← يبني أندرويد
  ios: false           # ← لا تبني iOS، هذا اللي حل المشكلة
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#CAD5D4"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
