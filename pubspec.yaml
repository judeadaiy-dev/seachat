name: seachat
description: SeaChat - Modern Arabic Chat App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  uuid: ^4.4.0 
  cupertino_icons: ^1.0.6
  supabase_flutter: ^2.6.0 # تم تحديثه لضمان توافق أفضل مع الإضافات
  google_sign_in: ^6.2.1
  image_picker: ^1.1.2
  # إضافة مكتبة التوافق مع دورة حياة التطبيق بشكل صريح لتجنب التعارض
  flutter_plugin_android_lifecycle: ^2.0.22 

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

dependency_overrides:
  # هذا الجزء يضمن عدم حدوث تعارض في الإصدارات أثناء البناء الآلي
  uuid: ^4.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#CAD5D4"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
