name: sea_chat
description: "Sea Chat - تطبيق دردشة حديث بتصميم عصري مدعوم بـ Supabase"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  
  # Supabase
  supabase_flutter: ^2.11.0
  
  # UI & Design
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  shimmer: ^3.0
  lottie: ^3.1.2
  glassmorphism: ^3.0.0
  flutter_animate: ^4.5.0
  
  # Images & Media
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  photo_view: ^0.15.0
  image_cropper: ^8.0.2
  
  # Audio & Video
  record: ^5.2.1
  just_audio: ^0.9.42
  audio_waveforms: ^1.2.0
  video_player: ^2.9.2
  
  # Utils
  timeago: ^3.7.0
  intl: ^0.19.0
  uuid: ^4.5.1
  permission_handler: ^11.3.1
  path_provider: ^2.1.4
  path: ^1.9.0
  share_plus: ^10.0.2
  url_launcher: ^6.3.1
  
  # State & Utils
  provider: ^6.1.2
  flutter_dotenv: ^5.1.0

dependency_overrides:
  record_platform_interface: ^1.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  
  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/lottie/
