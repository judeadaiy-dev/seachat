name: sea_chat
description: "A modern glassmorphism chat application powered by Supabase."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0' # رفعته لأن supabase 2.8 يحتاجه

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Backend - محدث لأحدث نسخة مستقرة
  supabase_flutter: ^2.8.0

  # Utilities - كلها محدثة
  uuid: ^4.5.0
  image_picker: ^1.1.2
  path_provider: ^2.1.3 # مهم لـ supabase الجديد
  
  # Fonts
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1 # أحدث نسخة تحل مشاكل Gradle 8

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png # لازم تعرف المسار

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  min_sdk_android: 21
  # هذه الإضافات تحل مشاكل AGP 8
  remove_alpha_ios: true
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon.png"
