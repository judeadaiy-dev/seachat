name: SeaChat Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Disable Flutter Analytics
        run: flutter config --no-analytics

      - name: Install Dependencies
        run: flutter pub get

      - name: Force SDK 35
        run: |
          if [ -f "android/app/build.gradle" ]; then
            sed -i 's/compileSdkVersion [0-9]*/compileSdkVersion 35/g' android/app/build.gradle
            sed -i 's/targetSdkVersion [0-9]*/targetSdkVersion 35/g' android/app/build.gradle
            sed -i 's/minSdkVersion [0-9]*/minSdkVersion 21/g' android/app/build.gradle
          fi
          
          if [ -f "android/build.gradle" ]; then
            cat >> android/build.gradle << 'EOF'

          subprojects {
              afterEvaluate { project ->
                  if (project.hasProperty("android")) {
                      android {
                          compileSdkVersion 35
                      }
                  }
              }
          }
          EOF
          fi
          
      - name: Build Debug APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Debug-APK
          path: build/app/outputs/flutter-apk/app-debug.apk
