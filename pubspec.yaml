name: sea_chat
description: "A modern glassmorphism chat application powered by Supabase."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Backend
  supabase_flutter: ^2.5.6

  # Chat Features
  image_picker: ^1.1.2
  record: ^5.2.1
  just_audio: ^0.9.46
  permission_handler: ^11.3.1
  google_sign_in: ^6.2.1

  # Utilities
  uuid: ^4.5.1
  path_provider: ^2.1.5
  
  # Fonts
  google_fonts: ^6.2.1

  # App Icons
  flutter_launcher_icons: ^0.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
  fonts:
    - family: Cairo
      fonts:
        - asset: fonts/Cairo-Regular.ttf
        - asset: fonts/Cairo-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
