name: sea_chat
description: تطبيق دردشة بحري متكامل
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.8.0
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  record: ^5.2.0
  just_audio: ^0.9.40
  path_provider: ^2.1.4
  timeago: ^3.7.0
  intl: ^0.19.0
  go_router: ^14.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/icon.png
  
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
