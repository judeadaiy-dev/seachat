name: Flutter Auto-Build SeaChat

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0' # متوافق مع متطلبات مشروعك

      - name: Reconstruct Android Environment
        run: |
          # 1. تنظيف وإضافة Go_router برمجياً لضمان استبدال app_links
          flutter pub remove app_links || true
          flutter pub add go_router
          
          # 2. حذف وإعادة إنشاء مجلد أندرويد ليكون حديثاً ومتوافقاً
          rm -rf android
          flutter create . --platforms android --org com.seachat.app
          
          # 3. ربط المسارات في الخادم
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
          
          # 4. ضبط الـ SDK على 35 لدعم مكتبات record و just_audio و image_picker
          sed -i 's/compileSdkVersion .*/compileSdkVersion 35/' android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 35/' android/app/build.gradle

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: |
          # بناء نسخة الإصدار مع تخطي تحذيرات الأيقونات إذا لم تكن موجودة بعد
          flutter build apk --release --no-tree-shake-icons
