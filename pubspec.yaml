name: sea_chat
description: "A modern chat application with glassmorphism design powered by Supabase."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # المكتبات الأساسية
  cached_network_image: ^3.4.1
  supabase_flutter: ^2.11.0
  app_links: ^6.4.1
  
  # الوسائط المتعددة (إصدارات متوافقة تمنع تعارض الـ Interface)
  image_picker: ^1.1.2
  record: ^5.1.0               # تم التثبيت على إصدار مستقر يحل مشكلة الصورة السابقة
  just_audio: ^0.9.42
  
  # الأدوات المساعدة
  permission_handler: ^11.3.1
  uuid: ^4.5.1
  path_provider: ^2.1.5
  timeago: ^3.7.0
  intl: ^0.19.0
  web: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/icon/

  fonts:
    - family: Cairo
      fonts:
        - asset: fonts/Cairo-Regular.ttf
          weight: 400
        - asset: fonts/Cairo-Bold.ttf
          weight: 700
