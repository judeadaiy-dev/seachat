name: sea_chat
description: "A modern chat application with glassmorphism design powered by Supabase."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.3.1
  supabase_flutter: ^2.10.6
  app_links: ^6.4.1
  image_picker: ^1.1.2
  record: ^6.0.0
  just_audio: ^0.9.42
  permission_handler: ^11.3.1
  uuid: ^4.5.1
  path_provider: ^2.1.5
  timeago: ^3.7.0
  intl: ^0.19.0

dependency_overrides:
  record_linux: 1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
  fonts:
    - family: Cairo
      fonts:
        - asset: fonts/Cairo-Regular.ttf
          weight: 400
        - asset: fonts/Cairo-Bold.ttf
          weight: 700
