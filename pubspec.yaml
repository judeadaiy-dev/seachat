name: sea_chat
description: "A modern chat application with glassmorphism design powered by Supabase."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  
  # UI & Icons
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.3.1

  # Backend
  supabase_flutter: ^2.10.6

  # Chat Features - بس اللي نحتاجه فعلاً
  image_picker: ^1.1.2
  record: ^6.0.0
  just_audio: ^0.9.42
  permission_handler: ^11.3.1

  # Utilities
  uuid: ^4.5.1
  path_provider: ^2.1.5
  timeago: ^3.7.0
  intl: ^0.19.0
  
  # App Icons
  flutter_launcher_icons: ^0.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/icon.png
    - assets/images/ # ضيف هذا اذا تريد صور ثابتة
  
  fonts:
    - family: Cairo
      fonts:
        - asset: fonts/Cairo-Regular.ttf
          weight: 400
        - asset: fonts/Cairo-Medium.ttf
          weight: 500
        - asset: fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: fonts/Cairo-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#2F45FF" # نفس لون الخلفية الموحدة
  adaptive_icon_foreground: "assets/icon_foreground.png"

